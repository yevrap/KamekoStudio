<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Tysiacha</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <div id="topbar">
        <div class="title">🎴 <span id="title-name">Tysiacha</span> <small id="title-sub">· to 1000</small></div>
        <div class="tb-btns">
            <button class="tb-btn" id="btn-restart">↺</button>
        </div>
    </div>

    <div id="opponents"></div>

    <div id="table">
        <div id="status"></div>
        <div id="trump-chip"></div>
        <button id="btn-log" title="Game log">📜</button>
        <div id="trick-area"></div>
        <div id="banner"></div>
    </div>

    <div id="tip"><span class="tip-icon">🧭</span><span id="tip-text"></span></div>

    <div id="actions"></div>

    <div id="hand-wrap">
        <div id="me-info"></div>
        <div id="hand"></div>
    </div>
</div>

<div class="overlay hidden" id="howto">
    <div class="panel">
        <div class="p-header">
            <h2 id="ht-title">Rules of Tysiacha</h2>
            <button class="icon-btn close-btn" id="ht-close-top">✕</button>
        </div>
        <div class="p-body" id="ht-body"></div>
    </div>
</div>

<div class="overlay hidden" id="logbook">
    <div class="panel">
        <div class="p-header">
            <h2 id="lg-title">📜 Game log</h2>
            <button class="icon-btn close-btn" id="lg-close-top">✕</button>
        </div>
        <div class="p-body" id="lg-body"></div>
    </div>
</div>

<div class="overlay hidden" id="marry">
    <div class="panel">
        <div class="p-header">
            <h2 id="marry-title">Declare a marriage?</h2>
            <button class="icon-btn close-btn" id="marry-close-top">✕</button>
        </div>
        <div class="p-body" id="marry-body"></div>
        <div class="p-nav">
            <button class="act-btn secondary" id="marry-no">Just play the card</button>
            <button class="act-btn" id="marry-yes">Declare!</button>
        </div>
    </div>
</div>

<div class="overlay hidden" id="summary">
    <div class="panel">
        <div class="p-header">
            <h2 id="sum-title"></h2>
            <button class="icon-btn close-btn" id="sum-close-top">✕</button>
        </div>
        <div class="p-body" id="sum-body"></div>
        <div class="p-nav">
            <button class="act-btn secondary" id="sum-log">📜 Review deal</button>
            <button class="act-btn" id="sum-next"></button>
        </div>
    </div>
</div>



<script type="module" src="main.js"></script>
<script src="../../shared/settings.js" data-gallery-depth="2"></script>
</body>
</html>
