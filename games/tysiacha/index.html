<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Tysiacha</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <div id="topbar">
        <div class="title">🎴 Tysiacha <small>· to 1000</small></div>
        <div class="tb-btns">
            <button class="tb-btn" id="btn-tys-settings">⚙️</button>
            <button class="tb-btn" id="btn-howto">Rules</button>
            <button class="tb-btn" id="btn-coach">Hint</button>
            <button class="tb-btn" id="btn-restart">↺</button>
        </div>
    </div>

    <div id="opponents"></div>

    <div id="table">
        <div id="status"></div>
        <div id="trump-chip"></div>
        <button id="btn-log" title="Game log">📜</button>
        <div id="trick-area"></div>
        <div id="banner"></div>
    </div>

    <div id="tip"><span class="tip-icon">🧭</span><span id="tip-text"></span></div>

    <div id="actions"></div>

    <div id="hand-wrap">
        <div id="me-info"></div>
        <div id="hand"></div>
    </div>
</div>

<div class="overlay hidden" id="howto">
    <div class="panel">
        <div class="p-header">
            <h2>Rules of Tysiacha</h2>
            <button class="icon-btn close-btn" id="ht-close-top">✕</button>
        </div>
        <div class="p-body" id="ht-body"></div>
    </div>
</div>

<div class="overlay hidden" id="logbook">
    <div class="panel">
        <div class="p-header">
            <h2>📜 Game log</h2>
            <button class="icon-btn close-btn" id="lg-close-top">✕</button>
        </div>
        <div class="p-body" id="lg-body"></div>
    </div>
</div>

<div class="overlay hidden" id="marry">
    <div class="panel">
        <div class="p-header">
            <h2>Declare a marriage?</h2>
            <button class="icon-btn close-btn" id="marry-close-top">✕</button>
        </div>
        <div class="p-body" id="marry-body"></div>
        <div class="p-nav">
            <button class="act-btn secondary" id="marry-no">Just play the card</button>
            <button class="act-btn" id="marry-yes">Declare!</button>
        </div>
    </div>
</div>

<div class="overlay hidden" id="summary">
    <div class="panel">
        <div class="p-header">
            <h2 id="sum-title"></h2>
            <button class="icon-btn close-btn" id="sum-close-top">✕</button>
        </div>
        <div class="p-body" id="sum-body"></div>
        <div class="p-nav">
            <button class="act-btn secondary" id="sum-log">📜 Review deal</button>
            <button class="act-btn" id="sum-next"></button>
        </div>
    </div>
</div>

<div class="overlay hidden" id="tys-settings">
    <div class="panel">
        <div class="p-header">
            <h2>Game Settings</h2>
            <button class="icon-btn close-btn" id="tys-set-close-top">✕</button>
        </div>
        <div class="p-body">
            <div class="setting-row">
                <label>Target Score</label>
                <select id="set-target">
                    <option value="500">500 (Quick Match)</option>
                    <option value="1000">1000 (Classic)</option>
                </select>
            </div>
            
            <div class="setting-header">Classic Rules</div>
            
            <label class="setting-check"><input type="checkbox" id="set-barrel"> <span><strong>The Barrel (880):</strong> Must win on the bid. 3 fails drops score.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-bolts"> <span><strong>Bolts:</strong> 0 tricks in a deal gives a bolt. 3 bolts = −120.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-rounding"> <span><strong>Rounding:</strong> Round scores to the nearest 5.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-reraise"> <span><strong>Re-raise:</strong> Declarer can raise bid after talon.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-raspasy"> <span><strong>Raspasy:</strong> If all pass, negative round is played.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-hidden"> <span><strong>Hidden Points:</strong> Hide opponent scores during deal.</span></label>
        </div>
        <div class="p-nav">
            <button class="act-btn" id="tys-set-apply">Apply & Restart</button>
        </div>
    </div>
</div>

<script type="module" src="main.js"></script>
<script src="../../shared/settings.js" data-gallery-depth="2"></script>
</body>
</html>
