<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Tysiacha</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <div id="topbar">
        <div class="title">🎴 <span id="title-name">Tysiacha</span> <small id="title-sub">· to 1000</small></div>
        <div class="tb-btns">
            <button class="tb-btn" id="btn-restart">↺</button>
        </div>
    </div>

    <div id="opponents"></div>

    <div id="table">
        <div id="status"></div>
        <div id="trump-chip"></div>
        <button id="btn-log" title="Game log">📜</button>
        <div id="trick-area"></div>
        <div id="banner"></div>
    </div>

    <div id="tip"><span class="tip-icon">🧭</span><span id="tip-text"></span></div>

    <div id="actions"></div>

    <div id="hand-wrap">
        <div id="me-info"></div>
        <div id="hand"></div>
    </div>
</div>

<div class="overlay hidden" id="howto">
    <div class="panel">
        <div class="p-header">
            <h2 id="ht-title">Rules of Tysiacha</h2>
            <button class="icon-btn close-btn" id="ht-close-top">✕</button>
        </div>
        <div class="p-body" id="ht-body"></div>
    </div>
</div>

<div class="overlay hidden" id="logbook">
    <div class="panel">
        <div class="p-header">
            <h2 id="lg-title">📜 Game log</h2>
            <button class="icon-btn close-btn" id="lg-close-top">✕</button>
        </div>
        <div class="p-body" id="lg-body"></div>
    </div>
</div>

<div class="overlay hidden" id="summary">
    <div class="panel">
        <div class="p-header">
            <h2 id="sum-title"></h2>
            <button class="icon-btn close-btn" id="sum-close-top">✕</button>
        </div>
        <div class="p-body" id="sum-body"></div>
        <div class="p-nav">
            <button class="act-btn secondary" id="sum-log">📜 Review deal</button>
            <button class="act-btn" id="sum-next"></button>
        </div>
    </div>
</div>

<div class="overlay hidden" id="setup">
    <div class="panel">
        <div class="p-header">
            <h2 id="setup-title">New Match</h2>
            <button class="icon-btn close-btn" id="setup-close-top">✕</button>
        </div>
        <div class="p-body">
            <div class="setting-header" id="set-names-hdr">Player Names</div>
            <div class="setting-row"><label id="lbl-name-0">You</label><input type="text" id="set-name-0" maxlength="12" autocomplete="off"></div>
            <div class="setting-row"><label id="lbl-name-1">Vera</label><input type="text" id="set-name-1" maxlength="12" autocomplete="off"></div>
            <div class="setting-row"><label id="lbl-name-2">Boris</label><input type="text" id="set-name-2" maxlength="12" autocomplete="off"></div>

            <div class="setting-header" id="set-match-hdr">Match</div>
            <div class="setting-row">
                <label id="lbl-target">Target Score</label>
                <select id="set-target">
                    <option id="opt-500" value="500">500 (Quick Match)</option>
                    <option id="opt-1000" value="1000">1000 (Classic)</option>
                </select>
            </div>

            <div class="setting-header" id="set-rules-hdr">Classic Rules</div>
            <label class="setting-check"><input type="checkbox" id="set-barrel"> <span id="lbl-barrel"><strong>The Barrel (880):</strong> Must win on the bid. 3 fails drops score.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-bolts"> <span id="lbl-bolts"><strong>Bolts:</strong> 0 tricks in a deal gives a bolt. 3 bolts = −120.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-rounding"> <span id="lbl-rounding"><strong>Rounding:</strong> Round scores to the nearest 5.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-reraise"> <span id="lbl-reraise"><strong>Re-raise:</strong> Declarer can raise bid after talon.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-raspasy"> <span id="lbl-raspasy"><strong>Raspasy:</strong> If all pass, negative round is played.</span></label>
            <label class="setting-check"><input type="checkbox" id="set-hidden"> <span id="lbl-hidden"><strong>Hidden Points:</strong> Hide opponent scores during deal.</span></label>
        </div>
        <div class="p-nav" style="display:flex; gap:12px;">
            <button class="act-btn" id="setup-play" style="flex:2;">▶ Play</button>
            <button class="act-btn secondary" id="setup-watch" style="flex:1;">▶ Watch</button>
        </div>
    </div>
</div>

<script type="module" src="main.js"></script>
<script src="../../shared/settings.js" data-gallery-depth="2"></script>
</body>
</html>
