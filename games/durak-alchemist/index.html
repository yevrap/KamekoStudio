<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Durak Alchemist</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include shared utilities and settings -->
    <script src="../../shared/settings.js" data-gallery-depth="2"></script>
</head>
<body class="dark-mode">
    <div id="start-screen">
        <h1>Durak Alchemist</h1>
        <p>Swipe to merge identical cards.</p>
        <p id="high-score-display" style="margin-top: -20px; margin-bottom: 30px; color: #888; font-size: 0.9rem;">High Score: 0</p>
        <button id="start-btn">Play 1🪙</button>
    </div>

    <div id="game-over-screen">
        <h2>Grid Locked!</h2>
        <button id="restart-btn">Restart</button>
    </div>

    <div id="game-container">
        <!-- Header -->
        <header id="header">
            <div id="score-display">Score: 0</div>
            <div id="trump-display"></div>
            <!-- Gear is injected here by settings.js (top: 15px right: 15px) -->
        </header>

        <!-- Combat Area (Hidden in Phase 1, but added to DOM) -->
        <div id="combat-area" style="display: none;">
            <div id="enemy-area">
                <div id="enemy-hp">Enemy HP: 100</div>
            </div>
            <div id="bout-area">
                <!-- Attack/Defense pairs go here -->
            </div>
        </div>

        <!-- Grid Area -->
        <div id="grid-wrapper">
            <div id="grid">
                <!-- 16 grid cells will be generated by JS -->
            </div>
        </div>

        <!-- Action Bar -->
        <footer id="action-bar">
            <div id="energy-display">Energy: 10</div>
            <button id="end-turn-btn" style="display: none;">End Turn</button>
        </footer>
    </div>

    <!-- Template for a Card -->
    <template id="card-template">
        <div class="card">
            <div class="card-tl"></div>
            <div class="card-center"></div>
            <div class="card-br"></div>
        </div>
    </template>

    <script type="module" src="main.js"></script>
</body>
</html>
