<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Durak Tactics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div id="start-screen" class="overlay">
        <h1>Durak Tactics</h1>
        <p>Turn-based grid tactics using standard Durak combat mechanics.</p>
        <button id="btn-start" class="btn-primary">Play (1🪙)</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display: none;">
        <h1 id="game-over-title">Game Over</h1>
        <p id="game-over-msg">You survived.</p>
        <button id="btn-restart" class="btn-primary" onclick="location.reload()">Back to Menu</button>
    </div>

    <!-- Map UI -->
    <div id="map-ui" class="overlay screen-ui" style="display: none;">
        <header class="screen-header">
            <h2>Campaign Map</h2>
            <div class="stats-info">Gold: <span id="map-gold">0</span> | Deck: <span id="map-deck-count">12</span></div>
        </header>
        <div id="map-container">
            <!-- Nodes generated by JS -->
        </div>
    </div>

    <!-- Rewards UI -->
    <div id="rewards-ui" class="overlay screen-ui justify-start" style="display: none;">
        <header class="screen-header"><h2>Victory!</h2></header>
        <p id="reward-gold-msg">You earned +10 Gold.</p>
        <h3>Draft a Card:</h3>
        <div id="draft-container" class="deck-display">
            <!-- Draft cards here -->
        </div>
        <button id="btn-skip-draft" class="btn-primary" style="margin-top: 20px;">Skip Draft</button>
    </div>

    <!-- Shop UI -->
    <div id="shop-ui" class="overlay screen-ui justify-start" style="display: none;">
        <header class="screen-header">
            <h2>Merchant</h2>
            <div class="stats-info">Gold: <span id="shop-gold">0</span></div>
        </header>
        <div id="shop-items" class="shop-list">
            <!-- Items injected by JS -->
        </div>
        <button id="btn-leave-shop" class="btn-primary" style="margin-top: 20px;">Leave Shop</button>
    </div>

    <!-- Event UI -->
    <div id="event-ui" class="overlay screen-ui justify-start" style="display: none;">
        <header class="screen-header"><h2 id="event-title">The Shrine</h2></header>
        <p id="event-desc">You discover a mysterious shrine...</p>
        <div class="event-choices">
            <button id="btn-event-a" class="btn-primary choice-btn">Option A</button>
            <button id="btn-event-b" class="btn-primary choice-btn">Option B</button>
        </div>
    </div>

    <!-- Battle UI -->
    <div id="game-ui" style="display: none;">
        <header id="header">
            <div class="header-content">
                <div class="title-area">
                    <h2>Durak Tactics</h2>
                    <div id="stats-info" class="stats-info">Trumps: Diamonds ♦</div>
                </div>
            </div>
        </header>

        <main id="battlefield">
            <div id="grid-container">
                <!-- 5x4 grid generated by JS -->
            </div>
            
            <div id="announcement-banner" class="banner" style="display: none;"></div>
        </main>

        <div id="bottom-bar">
            <div class="info-row">
                <span id="deck-count">Deck: 12</span>
                <button id="btn-end-turn" class="btn-action" disabled>End Turn</button>
            </div>
            
            <div id="hand-container">
                <!-- Cards generated by JS -->
            </div>
        </div>
    </div>

    <script src="../../shared/settings.js" data-gallery-depth="2"></script>
    <script src="game.js"></script>
</body>
</html>
