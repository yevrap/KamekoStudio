<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Durak</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

  <div id="app">
    <div id="header">
      <span id="game-title">DURAK</span>
      <span id="status-display"></span>
      <span id="trump-display"></span>
      <span id="deck-count"></span>
    </div>

    <div id="top-zone">
      <div id="top-options" class="options-row">
        <button class="action-btn" type="button" data-player="top" data-action="take">Take</button>
        <button class="action-btn" type="button" data-player="top" data-action="pass">Pass</button>
      </div>
      <div id="top-hand" class="hand-row"></div>
    </div>

    <div id="field">
      <!-- .field-pair columns generated by JS -->
    </div>

    <div id="bottom-zone">
      <div id="bottom-hand" class="hand-row"></div>
      <div id="bottom-options" class="options-row">
        <button class="action-btn" type="button" data-player="bottom" data-action="take">Take</button>
        <button class="action-btn" type="button" data-player="bottom" data-action="pass">Pass</button>
      </div>
    </div>
  </div>

  <!-- Start screen -->
  <div id="start-overlay" class="overlay">
    <div class="g-title">DURAK</div>
    <div class="g-sub">Classic Russian card game for two players</div>
    <div class="g-rules">Take turns attacking and defending. Play a higher card of the same suit or any trump card to defend. First to empty their hand wins!</div>
    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-btn active" type="button" data-mode="ai">vs Computer</button>
      <button class="mode-btn" type="button" data-mode="pvp">vs Player</button>
    </div>
    <button class="mbtn red" id="btn-play" type="button">&#9654; Play</button>
  </div>

  <!-- Game over screen -->
  <div id="gameover-overlay" class="overlay hidden">
    <div class="g-title" id="winner-text"></div>
    <button class="mbtn red" id="btn-replay" type="button">&#9654; Play Again</button>
  </div>

  <script type="module" src="main.js"></script>
  <script src="../../shared/settings.js" data-gallery-depth="2"></script>
</body>
</html>
