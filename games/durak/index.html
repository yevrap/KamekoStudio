<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#070b08" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#8ba994" media="(prefers-color-scheme: light)">
  <title>Durak</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

  <div id="app">
    <div id="header">
      <span id="game-title">DURAK</span>
    </div>

    <div id="opponents"></div>

    <div id="table-center">
      <div id="field-watermark" aria-hidden="true"></div>
      <div id="deck-zone">
        <div id="trump-slot"></div>
        <div id="deck-stack"></div>
      </div>
      <div id="deck-count"></div>
      <div id="status-display" class="action-prompt"></div>
      <div id="pile-banner" class="action-prompt is-pile-on hidden">Defender is taking &mdash; pile on or tap Done</div>
      <div id="field"></div>
    </div>

    <div id="human-zone">
      <div id="human-hand" class="hand-row"></div>
      <div id="human-options" class="options-row">
        <button class="action-btn hidden" type="button" id="btn-take" data-action="take">Take</button>
        <button class="action-btn hidden" type="button" id="btn-pass" data-action="pass">Pass</button>
        <button class="action-btn hidden" type="button" id="btn-done" data-action="done">Done</button>
      </div>
    </div>
  </div>

  <!-- Start screen -->
  <div id="start-overlay" class="overlay">
    <div class="g-title">DURAK</div>
    <div class="g-sub">Classic Russian card game, 2&ndash;6 players</div>
    <div class="g-rules">Attack with pairs, defend with higher cards of the same suit or trumps. The last player still holding cards is the Durak!</div>

    <div class="setup-label">Mode</div>
    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-btn active" type="button" data-mode="ai">vs Computer</button>
      <button class="mode-btn" type="button" data-mode="hotseat">Hot-seat</button>
    </div>

    <div class="setup-label">Players</div>
    <div class="count-toggle" id="count-toggle">
      <button class="count-btn" type="button" data-count="2">2</button>
      <button class="count-btn" type="button" data-count="3">3</button>
      <button class="count-btn active" type="button" data-count="4">4</button>
      <button class="count-btn" type="button" data-count="5">5</button>
      <button class="count-btn" type="button" data-count="6">6</button>
    </div>

    <button class="mbtn red" id="btn-play" type="button">&#9654; Play</button>
  </div>

  <!-- Pass device cover (hot-seat only) -->
  <div id="pass-device-overlay" class="overlay hidden">
    <div class="g-sub">Pass device to</div>
    <div class="g-title" id="pass-device-name"></div>
    <div class="g-rules">Tap anywhere when ready.</div>
  </div>

  <!-- Game over screen -->
  <div id="gameover-overlay" class="overlay hidden">
    <div class="g-title" id="winner-text"></div>
    <button class="mbtn red" id="btn-replay" type="button">&#9654; Play Again</button>
  </div>

  <script type="module" src="main.js"></script>
  <script src="../../shared/settings.js" data-gallery-depth="2"></script>
</body>
</html>
