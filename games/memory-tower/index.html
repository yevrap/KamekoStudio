<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Keypad Quest</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      height: 100dvh;
      background: #050510;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    #header {
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(5, 5, 16, 0.9);
      border-bottom: 1px solid rgba(0,255,238,0.15);
      flex-shrink: 0;
    }

    #wave-display { font-size: 0.85em; color: #00ffee; text-shadow: 0 0 8px #00ffee; }
    #streak-display { font-size: 0.8em; color: #ff44aa; text-shadow: 0 0 8px #ff44aa; min-width: 60px; text-align: center; }
    #token-display { font-size: 0.8em; color: #ffcc44; }

    #game-canvas {
      display: block;
      width: 100%;
      flex: 0 0 40%;
      min-height: 0;
    }

    #prompt-bar {
      flex-shrink: 0;
      height: 58px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 16px;
      background: rgba(0,0,0,0.55);
      border-top: 1px solid rgba(0,255,238,0.1);
      border-bottom: 1px solid rgba(0,255,238,0.08);
    }

    #question-text { font-size: 0.75em; color: rgba(255,255,255,0.55); letter-spacing: 0.05em; }
    #input-display {
      font-size: 1.25em; color: #fff;
      text-shadow: 0 0 12px #4488ff;
      letter-spacing: 0.08em; min-height: 1.4em;
    }

    #input-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #mode-toggle-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 5px 8px;
      flex-shrink: 0;
    }

    .mode-btn {
      padding: 4px 11px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 0.68em;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      min-height: 28px;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn.active { border-color: #00ffee; color: #00ffee; text-shadow: 0 0 6px #00ffee; }

    #t9-pad {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 3px;
      padding: 3px 4px;
    }

    .t9-key {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.15;
      transition: background 0.08s;
    }
    .t9-key.pressed, .t9-key:active { background: rgba(0,255,238,0.18); border-color: rgba(0,255,238,0.4); }
    .t9-key .kn { font-size: 1.15em; font-weight: bold; color: #fff; }
    .t9-key .kl { font-size: 0.52em; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; }
    .t9-key.ak .kn { font-size: 0.95em; }

    #keyboard-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 16px;
    }

    #keyboard-input {
      width: 100%;
      max-width: 320px;
      padding: 14px 16px;
      font-size: 1.15em;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(0,255,238,0.3);
      border-radius: 10px;
      color: #fff;
      font-family: 'Courier New', monospace;
      text-align: center;
      outline: none;
      touch-action: auto;
    }
    #keyboard-input:focus { border-color: rgba(0,255,238,0.7); box-shadow: 0 0 12px rgba(0,255,238,0.2); }

    #keyboard-submit {
      padding: 12px 36px;
      background: rgba(0,255,238,0.13);
      border: 1px solid rgba(0,255,238,0.4);
      border-radius: 10px;
      color: #00ffee;
      font-size: 1em;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    #keyboard-submit:active { background: rgba(0,255,238,0.28); }

    /* Overlays */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,5,16,0.96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .overlay.hidden { display: none; }

    .g-title {
      font-size: 1.9em;
      font-weight: bold;
      color: #00ffee;
      text-shadow: 0 0 20px #00ffee, 0 0 40px #00ffee55;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 6px;
    }
    .g-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.8em;
      margin-bottom: 6px;
      text-align: center;
    }

    .mbtn {
      width: 100%;
      max-width: 300px;
      padding: 13px 18px;
      margin: 4px 0;
      border-radius: 12px;
      font-size: 0.92em;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border: 1px solid;
      text-align: left;
      min-height: 50px;
      -webkit-tap-highlight-color: transparent;
    }
    .mbtn.teal { background: rgba(0,255,238,0.1); border-color: rgba(0,255,238,0.45); color: #00ffee; }
    .mbtn.teal:active { background: rgba(0,255,238,0.22); }
    .mbtn.dim { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.75); }
    .mbtn.dim:active { background: rgba(255,255,255,0.1); }
    .mbtn.pink { background: rgba(255,68,170,0.09); border-color: rgba(255,68,170,0.38); color: #ff88cc; }
    .mbtn.center { text-align: center; }

    .srow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 300px;
      padding: 9px 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin: 3px 0;
      font-size: 0.85em;
    }
    .slabel { color: rgba(255,255,255,0.5); }
    .sval { color: #fff; font-weight: bold; }
    .sval.teal { color: #00ffee; text-shadow: 0 0 8px #00ffee; }
    .sval.gold { color: #ffcc44; }

    #feedback-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.15s;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <span id="wave-display">Wave 1</span>
    <span id="streak-display"></span>
    <span id="token-display">🪙 <span id="headerTokenCount">0</span></span>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="prompt-bar">
    <div id="question-text">Select a mode to begin</div>
    <div id="input-display">▶</div>
  </div>

  <div id="input-area">
    <div id="mode-toggle-row">
      <button class="mode-btn" data-mode="scroll">T9 Scroll</button>
      <button class="mode-btn" data-mode="predict">T9 Predict</button>
      <button class="mode-btn" data-mode="keyboard">Keyboard</button>
    </div>
    <div id="t9-pad"></div>
    <div id="keyboard-wrap" style="display:none">
      <input id="keyboard-input" type="text" placeholder="type your answer"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="keyboard-submit">Submit ↵</button>
    </div>
  </div>
</div>

<!-- Menu overlay -->
<div id="menu-overlay" class="overlay">
  <div class="g-title">KEYPAD QUEST</div>
  <div class="g-sub">Build your defense by answering questions</div>
  <div id="menu-best" class="g-sub" style="color:#00ffee;margin-bottom:16px;"></div>
  <div id="continue-wrap" style="display:none;width:100%;max-width:300px;margin-bottom:4px;">
    <button class="mbtn teal" id="continue-btn">▶ Continue — Wave <span id="continue-wave-num">1</span></button>
  </div>
  <button class="mbtn teal" id="btn-arcade">🎮 Arcade — Built-in Decks</button>
  <button class="mbtn dim" id="btn-classic">📚 Classic — My Decks</button>
  <button class="mbtn pink" id="btn-chill">😌 Chill / Practice</button>
</div>

<!-- Summary overlay -->
<div id="summary-overlay" class="overlay hidden">
  <div class="g-title" id="sum-title">Wave 1 Complete!</div>
  <div class="g-sub" id="sum-subtitle"></div>
  <div id="sum-stats" style="width:100%;max-width:300px;margin:10px 0;"></div>
  <button class="mbtn teal center" id="btn-next-wave" style="margin-top:10px;">Next Wave ▶</button>
  <button class="mbtn dim center" id="btn-quit" style="margin-top:6px;">← Quit to Menu</button>
</div>

<div id="feedback-flash"></div>

<script>
(function () {
'use strict';

// ─── Arcade Decks ─────────────────────────────────────────────────────────────

const ARCADE_PAIRS = [
  {k:'France',v:'Paris'},{k:'Japan',v:'Tokyo'},{k:'Germany',v:'Berlin'},
  {k:'Brazil',v:'Brasilia'},{k:'Australia',v:'Canberra'},{k:'Canada',v:'Ottawa'},
  {k:'Italy',v:'Rome'},{k:'Spain',v:'Madrid'},{k:'China',v:'Beijing'},
  {k:'India',v:'New Delhi'},{k:'Mexico',v:'Mexico City'},{k:'Egypt',v:'Cairo'},
  {k:'Russia',v:'Moscow'},{k:'UK',v:'London'},{k:'Greece',v:'Athens'},
  {k:'Norway',v:'Oslo'},{k:'Poland',v:'Warsaw'},{k:'Thailand',v:'Bangkok'},
  {k:'Kenya',v:'Nairobi'},{k:'Argentina',v:'Buenos Aires'},
  {k:'3 × 3',v:'9'},{k:'3 × 4',v:'12'},{k:'4 × 4',v:'16'},{k:'4 × 6',v:'24'},
  {k:'6 × 6',v:'36'},{k:'6 × 7',v:'42'},{k:'7 × 7',v:'49'},{k:'7 × 8',v:'56'},
  {k:'8 × 8',v:'64'},{k:'8 × 9',v:'72'},{k:'9 × 9',v:'81'},{k:'6 × 8',v:'48'},
  {k:'H',v:'Hydrogen'},{k:'He',v:'Helium'},{k:'Li',v:'Lithium'},{k:'C',v:'Carbon'},
  {k:'N',v:'Nitrogen'},{k:'O',v:'Oxygen'},{k:'Na',v:'Sodium'},{k:'Fe',v:'Iron'},
  {k:'Au',v:'Gold'},{k:'Ag',v:'Silver'},{k:'Cu',v:'Copper'},{k:'K',v:'Potassium'},
  {k:'Ca',v:'Calcium'},{k:'Mg',v:'Magnesium'},{k:'Al',v:'Aluminium'},{k:'Zn',v:'Zinc'}
];

// ─── T9 ───────────────────────────────────────────────────────────────────────

const T9_MAP = {
  '2':['a','b','c'],'3':['d','e','f'],'4':['g','h','i'],
  '5':['j','k','l'],'6':['m','n','o'],'7':['p','q','r','s'],
  '8':['t','u','v'],'9':['w','x','y','z'],'0':[' ']
};

const T9_KEYS = [
  {n:'1',l:''},{n:'2',l:'ABC'},{n:'3',l:'DEF'},
  {n:'4',l:'GHI'},{n:'5',l:'JKL'},{n:'6',l:'MNO'},
  {n:'7',l:'PQRS'},{n:'8',l:'TUV'},{n:'9',l:'WXYZ'},
  {n:'⌫',l:'',a:'back'},{n:'0',l:'SPC'},{n:'✓',l:'',a:'ok'}
];

// ─── Tower type definitions ────────────────────────────────────────────────────

const TTYPES = [
  {name:'Basic', color:'#4488ff',glow:'#4488ff',range:95, dmg:14,rate:1.4, streak:0},
  {name:'Rapid', color:'#ff44aa',glow:'#ff44aa',range:62, dmg:7, rate:0.45,streak:3},
  {name:'Sniper',color:'#ffaa00',glow:'#ffaa00',range:165,dmg:38,rate:2.4, streak:5},
  {name:'Splash',color:'#44ffaa',glow:'#44ffaa',range:82, dmg:18,rate:1.6, streak:8, splash:true}
];

// ─── Constants ────────────────────────────────────────────────────────────────

const HEADER_H = 55;
const TR = 14;   // tower radius
const ER_X = 11; // enemy half-width
const ER_Y = 8;  // enemy half-height
const PR = 4;    // projectile radius
const PATH_Y_RATIO = 0.45;
const SLOT_COLS = 5;
const ROWS_ABOVE = 2;
const ROWS_BELOW = 2;
const ROW_SPACING = 28;
const SLOT_MARGIN = 28;

// ─── State ────────────────────────────────────────────────────────────────────

let gameState = 'menu';
let chillMode = false;
let deck = [];
let deckIdx = 0;
let currentPair = null;
let wave = 0;
let score = 0;
let waveScore = 0;
let multiplier = 1.0;
let streak = 0;
let correctW = 0, wrongW = 0;
let waveStartTime = 0;
let totalSpawned = 0, totalThisWave = 0;
let spawnTimer = 0, spawnInterval = 1.0;
let answerCount = 0;

let enemies = [], towers = [], projs = [], particles = [], ripples = [], floats = [], stars = [];
let slots = [];
let selectedTower = null;
let waveOver = false;

let inputMode = localStorage.getItem('keypadQuest_inputMode') || 'scroll';
let t9buf = '', t9pend = '', t9pendKey = '', t9pendIdx = 0, t9timer = null;
let t9keys = [], t9cands = [], t9ci = 0;

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, pathY = 0, rafId = null, lastTs = 0;

// ─── Persistence ──────────────────────────────────────────────────────────────

function getHW() { return parseInt(localStorage.getItem('keypadQuestHighWave') || '0', 10); }
function saveHW(w) { if (w > getHW()) localStorage.setItem('keypadQuestHighWave', w); }
function getBT(n) { return parseInt(localStorage.getItem('keypadQuestBestTime_' + n) || '0', 10); }
function saveBT(n, ms) {
  const p = getBT(n);
  if (p === 0 || ms < p) { localStorage.setItem('keypadQuestBestTime_' + n, ms); return true; }
  return false;
}
function saveCP() {
  if (wave % 5 !== 0) return;
  const data = {
    wave, score,
    towers: towers.map(t => ({ si: slots.indexOf(t.slot), ti: t.ti, lv: t.lv })),
    ts: Date.now()
  };
  localStorage.setItem('keypadQuestCheckpoint', JSON.stringify(data));
}
function loadCP() {
  try { return JSON.parse(localStorage.getItem('keypadQuestCheckpoint')); } catch(e) { return null; }
}
function clearCP() { localStorage.removeItem('keypadQuestCheckpoint'); }

// ─── Util ─────────────────────────────────────────────────────────────────────

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function lerpHex(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  const r = Math.round(((ah>>16)&0xff) + (((bh>>16)&0xff)-((ah>>16)&0xff))*t);
  const g = Math.round(((ah>>8)&0xff)  + (((bh>>8)&0xff) -((ah>>8)&0xff))*t);
  const bl= Math.round((ah&0xff)       + ((bh&0xff)      -(ah&0xff))*t);
  return '#'+(((r<<16)|(g<<8)|bl)>>>0).toString(16).padStart(6,'0');
}

// ─── Canvas / Slots setup ─────────────────────────────────────────────────────

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  if (rect.width <= 0 || rect.height <= 0) return;
  canvas.width  = Math.floor(rect.width);
  canvas.height = Math.floor(rect.height);
  W = canvas.width; H = canvas.height;
  pathY = Math.floor(H * PATH_Y_RATIO);
  buildSlots();
  buildStars();
}

function buildSlots() {
  slots = [];
  const colW = (W - SLOT_MARGIN * 2) / (SLOT_COLS - 1);
  for (let row = 0; row < ROWS_ABOVE; row++) {
    for (let col = 0; col < SLOT_COLS; col++) {
      slots.push({ x: SLOT_MARGIN + col * colW, y: pathY - 30 - row * ROW_SPACING, occupied: false, tower: null });
    }
  }
  for (let row = 0; row < ROWS_BELOW; row++) {
    for (let col = 0; col < SLOT_COLS; col++) {
      slots.push({ x: SLOT_MARGIN + col * colW, y: pathY + 30 + row * ROW_SPACING, occupied: false, tower: null });
    }
  }
}

// ─── Stars ────────────────────────────────────────────────────────────────────

function buildStars() {
  stars = Array.from({length:60}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.2+0.3,
    a: Math.random()*0.35+0.05,
    vx: (Math.random()-0.5)*0.08, vy: (Math.random()-0.5)*0.08
  }));
}

function drawStars() {
  ctx.save();
  for (const s of stars) {
    s.x = (s.x + s.vx + W) % W;
    s.y = (s.y + s.vy + H) % H;
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── Particles ────────────────────────────────────────────────────────────────

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI*2/n)*i + Math.random()*0.4;
    const spd = 1.5 + Math.random()*3;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      a: 1, r: 1.5+Math.random()*2, color, decay: 0.03+Math.random()*0.02 });
  }
}

function ripple(x, y, color) {
  ripples.push({ x, y, r: TR, maxR: 65, color, a: 0.85 });
}

function floatText(x, y, text, color) {
  floats.push({ x, y: y-8, text, color, a: 1, vy: -0.75 });
}

function updateFX(dt) {
  for (const p of particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.a-=p.decay; }
  particles = particles.filter(p => p.a > 0);
  for (const r of ripples) { r.r += 2.2; r.a -= 0.042; }
  ripples = ripples.filter(r => r.a > 0 && r.r < r.maxR);
  for (const f of floats) { f.y += f.vy; f.a -= 0.018; }
  floats = floats.filter(f => f.a > 0);
}

// ─── Enemies ──────────────────────────────────────────────────────────────────

function makeEnemy() {
  const hp = Math.round(10 * Math.pow(1.2, wave - 1));
  let spd = 55 * Math.pow(1.03, wave - 1);
  if (chillMode) spd *= 0.5;
  return { x: -ER_X, y: pathY, hp, maxHp: hp, spd, trail: [], dead: false, escaped: false };
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (e.dead || e.escaped) continue;
    e.trail.unshift({x:e.x, y:e.y});
    if (e.trail.length > 9) e.trail.pop();
    e.x += e.spd * dt;
    if (e.x > W + ER_X) {
      e.escaped = true;
      multiplier = Math.max(0.5, +(multiplier - 0.1).toFixed(1));
      flashEl('rgba(255,200,0,0.1)');
    }
  }
  enemies = enemies.filter(e => !e.dead);
}

function killEnemy(e) {
  if (e.dead) return;
  e.dead = true;
  const color = lerpHex('#4488ff','#ff4422', 1 - e.hp/e.maxHp);
  burst(e.x, e.y, color, 12);
  waveScore += 10;
}

// ─── Towers ───────────────────────────────────────────────────────────────────

function makeTower(slot, ti) {
  return { slot, ti, type: TTYPES[ti], lv: 1, cd: 0, pulse: Math.random()*Math.PI*2 };
}

function placeTower(ti) {
  const slot = bestSlot();
  if (!slot) return;
  slot.occupied = true;
  const t = makeTower(slot, ti);
  slot.tower = t;
  towers.push(t);
  ripple(slot.x, slot.y, TTYPES[ti].color);
  burst(slot.x, slot.y, TTYPES[ti].color, 10);
  if (navigator.vibrate) navigator.vibrate(30);
}

function bestSlot() {
  const free = slots.filter(s => !s.occupied);
  if (free.length === 0) return null;
  if (towers.length === 0) {
    // pick leftmost slot closest to path center x
    return free.reduce((a, b) => a.x < b.x ? a : b);
  }
  let best = null, bestScore = -1;
  for (const s of free) {
    let minD = Infinity;
    for (const t of towers) {
      const d = Math.hypot(s.x - t.slot.x, s.y - t.slot.y);
      if (d < minD) minD = d;
    }
    if (minD > bestScore) { bestScore = minD; best = s; }
  }
  return best;
}

function upgradeRandom() {
  if (towers.length === 0) return;
  const t = towers[Math.floor(Math.random()*towers.length)];
  t.lv++;
  floatText(t.slot.x, t.slot.y, '▲ Lv'+t.lv, t.type.color);
  ripple(t.slot.x, t.slot.y, t.type.color);
}

function updateTowers(dt) {
  for (const t of towers) {
    t.pulse += dt * 1.8;
    if (t.cd > 0) { t.cd -= dt; continue; }
    let target = null, minD = Infinity;
    for (const e of enemies) {
      if (e.dead || e.escaped) continue;
      const d = Math.hypot(e.x - t.slot.x, e.y - t.slot.y);
      if (d <= t.type.range && d < minD) { minD = d; target = e; }
    }
    if (!target) continue;
    t.cd = t.type.rate;
    const dx = target.x - t.slot.x, dy = target.y - t.slot.y;
    const len = Math.hypot(dx, dy) || 1;
    projs.push({
      x: t.slot.x, y: t.slot.y,
      vx: (dx/len)*210, vy: (dy/len)*210,
      dmg: t.type.dmg * t.lv,
      color: t.type.color,
      splash: !!t.type.splash,
      trail: [], dead: false
    });
  }
}

// ─── Projectiles ──────────────────────────────────────────────────────────────

function updateProjs(dt) {
  for (const p of projs) {
    if (p.dead) continue;
    p.trail.unshift({x:p.x, y:p.y});
    if (p.trail.length > 4) p.trail.pop();
    p.x += p.vx*dt; p.y += p.vy*dt;
    for (const e of enemies) {
      if (e.dead || e.escaped) continue;
      if (Math.abs(p.x-e.x) < ER_X && Math.abs(p.y-e.y) < ER_Y) {
        if (p.splash) {
          for (const e2 of enemies) {
            if (e2.dead || e2.escaped) continue;
            if (Math.hypot(e2.x-p.x, e2.y-p.y) < 42) { e2.hp -= p.dmg; if (e2.hp<=0) killEnemy(e2); }
          }
          burst(p.x, p.y, p.color, 15);
        } else {
          e.hp -= p.dmg;
          if (e.hp <= 0) killEnemy(e);
        }
        p.dead = true; break;
      }
    }
    if (p.x < -20 || p.x > W+20 || p.y < -20 || p.y > H+20) p.dead = true;
  }
  projs = projs.filter(p => !p.dead);
}

// ─── Wave management ──────────────────────────────────────────────────────────

function startWave(n) {
  wave = n; waveScore = 0; multiplier = 1.0; correctW = 0; wrongW = 0;
  waveStartTime = performance.now();
  totalThisWave = 5 + wave * 2;
  totalSpawned = 0;
  spawnInterval = Math.max(0.2, 1.0 - (wave-1)*0.03);
  spawnTimer = 0;
  enemies = []; projs = []; particles = []; ripples = []; floats = [];
  selectedTower = null;
  waveOver = false;
  document.getElementById('wave-display').textContent = 'Wave ' + wave;
  showNextPrompt();
}

function updateWave(dt) {
  if (totalSpawned < totalThisWave) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) { enemies.push(makeEnemy()); totalSpawned++; spawnTimer = spawnInterval; }
  }
  if (!waveOver && totalSpawned >= totalThisWave) {
    const alive = enemies.filter(e => !e.dead && !e.escaped);
    if (alive.length === 0) { waveOver = true; endWave(); }
  }
}

function endWave() {
  const elapsed = performance.now() - waveStartTime;
  const fs = Math.round(waveScore * multiplier);
  score += fs;
  saveHW(wave);
  const newBest = !chillMode && saveBT(wave, elapsed);
  if (!chillMode && wave % 5 === 0) saveCP();
  gameState = 'summary';
  showSummary(elapsed, fs, newBest);
}

// ─── Drawing ──────────────────────────────────────────────────────────────────

function drawPath() {
  ctx.save();
  // Glow line
  ctx.shadowBlur = 20; ctx.shadowColor = '#00ffee';
  ctx.strokeStyle = '#00ffee44'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, pathY); ctx.lineTo(W, pathY); ctx.stroke();
  // Bright center
  ctx.shadowBlur = 6; ctx.strokeStyle = '#00ffeeaa'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, pathY); ctx.lineTo(W, pathY); ctx.stroke();
  // End marker
  ctx.shadowBlur = 22; ctx.shadowColor = '#ff4444'; ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W-5, pathY-22); ctx.lineTo(W-5, pathY+22); ctx.stroke();
  ctx.restore();
}

function drawSlots() {
  ctx.save();
  for (const s of slots) {
    if (s.occupied) continue;
    ctx.globalAlpha = 0.22; ctx.strokeStyle = '#4488ff';
    ctx.shadowBlur = 5; ctx.shadowColor = '#4488ff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(s.x, s.y, TR-1, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.restore();
}

function drawTowers() {
  ctx.save();
  for (const t of towers) {
    const sx = t.slot.x, sy = t.slot.y;
    const p = Math.sin(t.pulse)*0.3+0.7;
    ctx.shadowBlur = 14 + p*10; ctx.shadowColor = t.type.glow;
    ctx.fillStyle = t.type.color; ctx.globalAlpha = 0.88;
    ctx.beginPath(); ctx.arc(sx, sy, TR, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.fillStyle = '#fff'; ctx.shadowBlur = 3; ctx.shadowColor = '#fff';
    ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t.lv > 1 ? t.lv : t.type.name[0], sx, sy);
    if (selectedTower === t) {
      ctx.globalAlpha = 0.55; ctx.strokeStyle = '#fff'; ctx.shadowBlur = 8; ctx.shadowColor = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(sx, sy, TR+5, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 0.1; ctx.strokeStyle = t.type.color; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(sx, sy, t.type.range, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

function drawEnemies() {
  ctx.save();
  for (const e of enemies) {
    if (e.dead || e.escaped) continue;
    const hp = e.hp/e.maxHp;
    const color = lerpHex('#4488ff','#ff4422', 1-hp);
    // Trail
    for (let i = 0; i < e.trail.length; i++) {
      ctx.globalAlpha = (1-i/e.trail.length)*0.22;
      const tr2 = ER_X*(1-i/e.trail.length)*0.65;
      ctx.fillStyle = '#4488ff'; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.ellipse(e.trail[i].x, e.trail[i].y, tr2, tr2*0.7, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 0.92;
    ctx.shadowBlur = 12; ctx.shadowColor = color; ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(e.x, e.y, ER_X, ER_Y, 0, 0, Math.PI*2); ctx.fill();
    // HP bar
    ctx.globalAlpha = 0.75; ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(e.x-ER_X, e.y-ER_Y-7, ER_X*2, 3);
    ctx.fillStyle = color;
    ctx.fillRect(e.x-ER_X, e.y-ER_Y-7, ER_X*2*hp, 3);
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawProjs() {
  ctx.save();
  for (const p of projs) {
    for (let i = 0; i < p.trail.length; i++) {
      ctx.globalAlpha = (1-i/p.trail.length)*0.45;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.trail[i].x, p.trail[i].y, PR*(1-i/p.trail.length), 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 10; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, PR, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawFX() {
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0,p.a); ctx.shadowBlur = 5; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  for (const r of ripples) {
    ctx.globalAlpha = Math.max(0,r.a); ctx.strokeStyle = r.color;
    ctx.shadowBlur = 8; ctx.shadowColor = r.color; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.stroke();
  }
  ctx.font = 'bold 10px Courier New'; ctx.textAlign = 'center';
  for (const f of floats) {
    ctx.globalAlpha = Math.max(0,f.a); ctx.fillStyle = f.color;
    ctx.shadowBlur = 7; ctx.shadowColor = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1; ctx.restore();
}

function drawFrame() {
  ctx.fillStyle = 'rgba(5,5,16,0.84)';
  ctx.fillRect(0, 0, W, H);
  drawStars();
  drawPath();
  drawSlots();
  drawFX();
  drawEnemies();
  drawTowers();
  drawProjs();
}

// ─── Game loop ────────────────────────────────────────────────────────────────

function loop(ts) {
  const dt = Math.min((ts - lastTs)/1000, 0.1);
  lastTs = ts;
  if (gameState === 'playing') {
    updateWave(dt);
    updateEnemies(dt);
    updateTowers(dt);
    updateProjs(dt);
    updateFX(dt);
  } else {
    updateFX(dt);
  }
  drawFrame();
  rafId = requestAnimationFrame(loop);
}

function startLoop() {
  if (rafId) cancelAnimationFrame(rafId);
  lastTs = performance.now();
  rafId = requestAnimationFrame(loop);
}

// ─── T9 input ────────────────────────────────────────────────────────────────

function confirmScrollChar() {
  if (!t9pend) return;
  t9buf += t9pend; t9pend = ''; t9pendKey = ''; t9pendIdx = 0;
  updateInputDisplay();
}

function handleT9(key) {
  if (gameState !== 'playing') return;
  if (key === 'back') {
    clearTimeout(t9timer);
    if (inputMode === 'scroll') {
      if (t9pend) { t9pend = ''; t9pendKey = ''; t9pendIdx = 0; }
      else if (t9buf.length > 0) t9buf = t9buf.slice(0,-1);
    } else {
      if (t9keys.length > 0) t9keys.pop();
      updatePredict();
    }
    updateInputDisplay(); return;
  }
  if (key === 'ok') {
    if (inputMode === 'scroll') {
      clearTimeout(t9timer); confirmScrollChar();
      submitAnswer(t9buf); t9buf = '';
    } else {
      submitAnswer(t9cands[t9ci] || '');
      t9keys = []; t9cands = [];
    }
    updateInputDisplay(); return;
  }
  if (inputMode === 'scroll') {
    const letters = T9_MAP[key];
    if (!letters || letters.length === 0) return;
    clearTimeout(t9timer);
    if (t9pendKey === key) {
      t9pendIdx = (t9pendIdx + 1) % (letters.length + 1);
      t9pend = t9pendIdx === letters.length ? key : letters[t9pendIdx].toUpperCase();
    } else {
      confirmScrollChar();
      t9pendKey = key; t9pendIdx = 0;
      t9pend = letters[0].toUpperCase();
    }
    t9timer = setTimeout(confirmScrollChar, 820);
  } else {
    t9keys.push(key);
    updatePredict(); t9ci = 0;
  }
  updateInputDisplay();
}

function updatePredict() {
  if (t9keys.length === 0) { t9cands = []; return; }
  const vals = deck.map(p => p.v.toLowerCase());
  t9cands = [...new Set(vals.filter(v => {
    if (v.length < t9keys.length) return false;
    for (let i = 0; i < t9keys.length; i++) {
      const al = T9_MAP[t9keys[i]];
      if (!al || al.length === 0) continue;
      if (!al.includes(v[i])) return false;
    }
    return true;
  }))];
}

function updateInputDisplay() {
  const el = document.getElementById('input-display');
  if (inputMode === 'scroll') {
    const txt = t9buf + (t9pend ? '['+t9pend+']' : '');
    el.textContent = txt || '▶';
  } else if (inputMode === 'predict') {
    el.textContent = t9cands.length > 0 ? t9cands[t9ci] : (t9keys.length > 0 ? '?' : '▶');
  } else {
    const ki = document.getElementById('keyboard-input');
    el.textContent = ki.value || '▶';
  }
}

// ─── Answer handling ──────────────────────────────────────────────────────────

function showNextPrompt() {
  if (!deck.length) return;
  currentPair = deck[deckIdx % deck.length]; deckIdx++;
  document.getElementById('question-text').textContent = currentPair.k;
  t9buf = ''; t9pend = ''; t9pendKey = ''; t9keys = []; t9cands = [];
  updateInputDisplay();
  if (inputMode === 'keyboard') setTimeout(() => document.getElementById('keyboard-input').focus(), 50);
}

function typeForStreak(s) {
  if (s >= 8) return 3;
  if (s >= 5) return 2;
  if (s >= 3) return 1;
  return 0;
}

function submitAnswer(raw) {
  if (!currentPair) return;
  const ans = raw.trim().toLowerCase();
  const correct = ans === currentPair.v.toLowerCase();
  if (correct) {
    streak++; correctW++; answerCount++;
    placeTower(typeForStreak(streak));
    floatText(W/2, pathY - 45, '✓ '+currentPair.v, '#44ffaa');
    if (answerCount % 10 === 0) upgradeRandom();
    updateStreakDisplay();
    t9buf = ''; t9pend = ''; t9pendKey = ''; t9keys = []; t9cands = [];
    showNextPrompt();
  } else {
    streak = 0; wrongW++;
    updateStreakDisplay();
    flashEl('rgba(255,50,50,0.14)');
    t9buf = ''; t9pend = ''; t9pendKey = ''; t9keys = []; t9cands = [];
    updateInputDisplay();
    if (navigator.vibrate) navigator.vibrate([50,30,50]);
  }
}

function flashEl(bg) {
  const el = document.getElementById('feedback-flash');
  el.style.background = bg;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 280);
}

function updateStreakDisplay() {
  const el = document.getElementById('streak-display');
  el.textContent = streak >= 3 ? '⚡ ×'+streak : '';
}

// ─── Screens ──────────────────────────────────────────────────────────────────

function showMenu() {
  gameState = 'menu';
  document.getElementById('menu-overlay').classList.remove('hidden');
  document.getElementById('summary-overlay').classList.add('hidden');
  const hw = getHW();
  document.getElementById('menu-best').textContent = hw > 0 ? 'Best: Wave '+hw : '';
  const cp = loadCP();
  if (cp) {
    document.getElementById('continue-wrap').style.display = '';
    document.getElementById('continue-wave-num').textContent = cp.wave + 1;
  } else {
    document.getElementById('continue-wrap').style.display = 'none';
  }
}

function showSummary(elapsed, fs, newBest) {
  document.getElementById('summary-overlay').classList.remove('hidden');
  document.getElementById('sum-title').textContent = 'Wave '+wave+' Complete!';
  document.getElementById('sum-subtitle').textContent = newBest ? '🏆 New Wave Record!' : '';
  const acc = correctW+wrongW > 0 ? Math.round(correctW/(correctW+wrongW)*100) : 100;
  const secs = (elapsed/1000).toFixed(1);
  const bms = getBestTime(wave);
  const bestStr = bms > 0 ? (bms/1000).toFixed(1)+'s' : '—';
  const rows = [
    ['Wave Time', secs+'s', newBest ? 'gold' : ''],
    ['Best Time', newBest ? '★ NEW!' : bestStr, newBest ? 'teal' : ''],
    ['Accuracy', acc+'%', acc>=80?'teal':''],
    ['Score Earned', '+'+fs, 'teal'],
    ['Total Score', score, ''],
    ['Towers', towers.length+'/'+slots.length, '']
  ];
  const container = document.getElementById('sum-stats');
  container.innerHTML = '';
  for (const [label, val, cls] of rows) {
    const row = document.createElement('div');
    row.className = 'srow';
    row.innerHTML = '<span class="slabel">'+label+'</span><span class="sval '+cls+'">'+val+'</span>';
    container.appendChild(row);
  }
}

// ─── Game start / continue ────────────────────────────────────────────────────

function startGame(mode, fromCP) {
  if (!window.KamekoTokens || !window.KamekoTokens.spend()) {
    if (window.KamekoTokens) window.KamekoTokens.toast();
    return;
  }
  localStorage.setItem('lastPlayed_memoryTower', Date.now());
  chillMode = (mode === 'chill');
  deck = shuffle(ARCADE_PAIRS.slice());
  deckIdx = 0; answerCount = 0; streak = 0; score = 0;
  document.getElementById('menu-overlay').classList.add('hidden');
  for (const s of slots) { s.occupied = false; s.tower = null; }
  towers = [];

  if (fromCP) {
    const cp = loadCP();
    if (cp) {
      score = cp.score || 0;
      if (cp.towers) {
        for (const td of cp.towers) {
          if (td.si >= 0 && td.si < slots.length) {
            const s = slots[td.si]; s.occupied = true;
            const t = makeTower(s, td.ti); t.lv = td.lv;
            s.tower = t; towers.push(t);
          }
        }
      }
      startWave(cp.wave + 1);
      gameState = 'playing';
      updateStreakDisplay(); updateInputDisplay(); return;
    }
  }
  clearCP();
  startWave(1);
  gameState = 'playing';
  updateStreakDisplay(); updateInputDisplay();
}

// ─── Input mode switching ─────────────────────────────────────────────────────

function setInputMode(mode) {
  inputMode = mode;
  localStorage.setItem('keypadQuest_inputMode', mode);
  t9buf = ''; t9pend = ''; t9pendKey = ''; t9keys = []; t9cands = [];
  const pad = document.getElementById('t9-pad');
  const kw = document.getElementById('keyboard-wrap');
  if (mode === 'keyboard') {
    pad.style.display = 'none'; kw.style.display = '';
    if (gameState === 'playing') setTimeout(() => document.getElementById('keyboard-input').focus(), 50);
  } else {
    pad.style.display = ''; kw.style.display = 'none';
  }
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  updateInputDisplay();
}

function buildT9Pad() {
  const pad = document.getElementById('t9-pad');
  pad.innerHTML = '';
  for (const key of T9_KEYS) {
    const btn = document.createElement('button');
    btn.className = 't9-key' + (key.a ? ' ak' : '');
    btn.innerHTML = '<span class="kn">'+key.n+'</span>' + (key.l ? '<span class="kl">'+key.l+'</span>' : '');
    const k = key.a || key.n;
    btn.addEventListener('pointerdown', e => {
      e.preventDefault();
      btn.classList.add('pressed');
      handleT9(k);
    });
    btn.addEventListener('pointerup',    () => btn.classList.remove('pressed'));
    btn.addEventListener('pointerleave', () => btn.classList.remove('pressed'));
    pad.appendChild(btn);
  }
}

// ─── Canvas click — tower selection & move ────────────────────────────────────

canvas.addEventListener('pointerdown', e => {
  if (gameState !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (W / rect.width);
  const cy = (e.clientY - rect.top) * (H / rect.height);

  for (const t of towers) {
    if (Math.hypot(cx - t.slot.x, cy - t.slot.y) < TR + 8) {
      selectedTower = (selectedTower === t) ? null : t;
      return;
    }
  }
  if (selectedTower) {
    for (const s of slots) {
      if (s.occupied) continue;
      if (Math.hypot(cx - s.x, cy - s.y) < TR + 10) {
        selectedTower.slot.occupied = false; selectedTower.slot.tower = null;
        s.occupied = true; s.tower = selectedTower;
        selectedTower.slot = s; selectedTower = null;
        return;
      }
    }
    selectedTower = null;
  }
});

// ─── Keyboard shortcuts for T9 ────────────────────────────────────────────────

window.addEventListener('keydown', e => {
  if (gameState !== 'playing' || inputMode === 'keyboard') return;
  if (e.key === 'Backspace') { handleT9('back'); e.preventDefault(); return; }
  if (e.key === 'Enter' || e.key === ' ') { handleT9('ok'); e.preventDefault(); return; }
  if (/^[0-9]$/.test(e.key)) { handleT9(e.key); e.preventDefault(); }
});

// ─── Keyboard mode submit ─────────────────────────────────────────────────────

document.getElementById('keyboard-submit').addEventListener('click', () => {
  const ki = document.getElementById('keyboard-input');
  submitAnswer(ki.value); ki.value = ''; ki.focus();
});

document.getElementById('keyboard-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { submitAnswer(e.target.value); e.target.value = ''; updateInputDisplay(); }
  else setTimeout(updateInputDisplay, 0);
});

// ─── Mode buttons ─────────────────────────────────────────────────────────────

document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => setInputMode(b.dataset.mode)));

// ─── Menu buttons ─────────────────────────────────────────────────────────────

document.getElementById('btn-arcade').addEventListener('click',   () => startGame('arcade', false));
document.getElementById('btn-classic').addEventListener('click',  () => startGame('arcade', false));
document.getElementById('btn-chill').addEventListener('click',    () => startGame('chill', false));
document.getElementById('continue-btn').addEventListener('click', () => startGame('arcade', true));

document.getElementById('btn-next-wave').addEventListener('click', () => {
  document.getElementById('summary-overlay').classList.add('hidden');
  startWave(wave + 1);
  gameState = 'playing';
});

document.getElementById('btn-quit').addEventListener('click', () => {
  document.getElementById('summary-overlay').classList.add('hidden');
  towers = []; enemies = []; projs = [];
  for (const s of slots) { s.occupied = false; s.tower = null; }
  showMenu();
});

// ─── Settings integration ─────────────────────────────────────────────────────

window.addEventListener('settingsOpened', () => {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (gameState === 'playing') gameState = 'paused';
});

window.addEventListener('settingsClosed', () => {
  if (gameState === 'paused') gameState = 'playing';
  startLoop();
});

// ─── Init ─────────────────────────────────────────────────────────────────────

function init() {
  resizeCanvas();
  buildT9Pad();
  setInputMode(inputMode);
  showMenu();
  startLoop();
}

window.addEventListener('resize', resizeCanvas);

window.addEventListener('pageshow', e => {
  if (e.persisted && gameState === 'menu') showMenu();
});

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
