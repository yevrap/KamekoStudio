<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Object Game - Vertical Mobile Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="mainScreen" class="main-screen">
    <h1 class="screen-title-lg title-gradient">Emoji Hunter</h1>

    <div class="token-section">
        <div class="currency-display">
            <p class="token-label">Tokens</p>
            <p id="tokenDisplayMain" class="token-value">0</p>
        </div>
        <p class="token-hint">Each game costs 1 token. Get tokens in ⚙️ Settings.</p>
    </div>

    <button id="startGameButton" class="btn-primary">
        Start New Game (1 🪙)
    </button>
</div>

<div id="gameScreenContainer" class="game-screen hidden">
    <header class="game-header">
        <h1 class="screen-title-sm title-gradient">Find The Hidden Emoji!</h1>
        <p id="targetMessage" class="target-message">Loading your challenge...</p>
    </header>

    <main class="game-viewport">
        <canvas id="gameCanvas"></canvas>
        <div id="roundTimerDisplay">Time: 20s</div>
        <div id="currentRoundDisplay">Round: 1</div>

        <div id="successModal" class="modal-overlay custom-modal hidden">
            <div class="modal-card">
                <p id="successMessageText" class="modal-title-success">🎉 You found it! 🎉</p>
                <p id="timeTakenText" class="modal-subtext"></p>
                <p id="foundObjectName" class="modal-body-text"></p>
                <button id="nextRoundButton" class="btn-secondary">
                    Next Round
                </button>
            </div>
        </div>

        <div id="gameOverModal" class="modal-overlay game-over-modal hidden">
            <div class="modal-card">
                <p class="modal-title-danger">⏰ Time's Up! ⏰</p>
                <p class="modal-subtitle">Session Over</p>
                <p id="sessionEndedScoreText" class="modal-score-text"></p>
                <button id="backToMainScreenButtonFromGameOver" class="btn-warning">
                    Main Menu
                </button>
            </div>
        </div>
    </main>

    <footer class="game-footer">
        <button id="quitToMenuButton" class="btn-danger">
            Quit to Main Menu
        </button>
        <p class="footer-hint">Tap or click the correct emoji. Beat the clock!</p>
    </footer>
</div>

<script type="module" src="main.js"></script>
<script src="../../shared/settings.js" data-gallery-depth="2"></script>
</body>
</html>
