<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Astro Salon</title>
    <!-- astro-salon v20 — zodiac-guest redesign: signs as characters, month-name dates, en/ru -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0b0a1a;
            --surface: #16142e;
            --surface2: #1e1b3e;
            --border: #2e2a55;
            --text: #e8e4ff;
            --muted: #8d86bb;
            --gold: #ffd166;
            --good: #34d399;
            --bad: #f87171;
            --fire: #ff7a5c;
            --earth: #4ade80;
            --air: #60a5fa;
            --water: #b18aff;
        }

        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(120% 90% at 50% 0%, #1a1440 0%, var(--bg) 55%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ---------- header ---------- */
        header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.55rem 0.9rem;
            padding-top: max(0.55rem, env(safe-area-inset-top));
            border-bottom: 1px solid var(--border);
            flex: 0 0 auto;
        }
        .title { font-weight: 800; font-size: 0.9rem; letter-spacing: 0.03em; white-space: nowrap; }
        .title span { color: var(--gold); }
        .hud { margin-left: auto; display: flex; align-items: center; gap: 0.45rem; }
        .stars {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--gold);
            min-width: 3.2ch;
            text-align: right;
        }
        .stars.pop { animation: pop 0.35s ease; }
        @keyframes pop { 40% { transform: scale(1.35); } }
        .streak { font-size: 0.75rem; color: var(--muted); font-weight: 700; }
        .streak.hot { color: var(--fire); }
        .icon-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            min-width: 40px;
            min-height: 38px;
            font-size: 1rem;
            cursor: pointer;
        }
        .icon-btn:active { background: var(--surface2); }
        .lang-btn { font-size: 0.8rem; font-weight: 800; letter-spacing: 0.04em; }

        /* ---------- wheel ---------- */
        .wheel-wrap {
            flex: 0 0 auto;
            display: flex;
            justify-content: center;
            padding: 0.4rem 0 0.1rem;
        }
        svg.wheel {
            width: min(96vw, 52dvh, 460px);
            height: auto;
            display: block;
            transition: opacity 0.25s;
        }
        svg.wheel.dimmed { opacity: 0.45; pointer-events: none; }
        .wedge {
            cursor: pointer;
            transition: fill-opacity 0.15s;
        }
        .wedge:active { fill-opacity: 0.55; }
        .wedge.correct { animation: wedgeGood 0.9s ease 2; }
        .wedge.wrong { animation: wedgeBad 0.5s ease; }
        @keyframes wedgeGood { 50% { fill-opacity: 0.85; } }
        @keyframes wedgeBad { 25%, 75% { fill-opacity: 0.8; } }
        .wedge-sym { font-size: 23px; pointer-events: none; }
        .wedge-name { font-size: 9.5px; font-weight: 700; fill: #d9d4f5; pointer-events: none; }
        .wedge-date { font-size: 10px; fill: #bdb6e6; pointer-events: none; }
        .season-label { font-size: 12px; fill: #7d76ad; pointer-events: none; font-weight: 600; }
        .hub-main { font-size: 26px; font-weight: 800; fill: var(--text); }
        .hub-sub { font-size: 12.5px; fill: var(--muted); }

        /* ---------- dialogue ---------- */
        .stage {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 0.35rem 0.9rem calc(0.75rem + env(safe-area-inset-bottom));
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 0.8rem 0.95rem;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .client-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.45rem; }
        .client-emoji { font-size: 2.1rem; }
        .client-name { font-weight: 800; font-size: 1.05rem; }
        .client-sub { font-size: 0.74rem; color: var(--muted); }
        .speech { font-size: 1rem; line-height: 1.45; }
        .bday { display: none; margin-top: 0.45rem; font-size: 1.25rem; font-weight: 800; color: var(--gold); }
        .bday.show { display: block; }
        .prompt { margin-top: 0.45rem; font-size: 0.84rem; color: var(--muted); font-weight: 600; }
        .feedback { margin-top: 0.5rem; font-size: 0.92rem; line-height: 1.45; border-radius: 10px; padding: 0.5rem 0.65rem; display: none; }
        .feedback.good { display: block; background: #12351f88; border: 1px solid #34d39955; }
        .feedback.bad { display: block; background: #3a161688; border: 1px solid #f8717155; }
        .feedback.hint { display: block; background: #2a234f88; border: 1px solid #6655cc66; }

        .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.65rem; }
        .chips.single { grid-template-columns: 1fr; }
        .chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            min-height: 52px;
            padding: 0.45rem 0.6rem;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            line-height: 1.25;
        }
        .chip small { display: block; font-weight: 500; font-size: 0.72rem; color: var(--muted); }
        .chip:active { background: #262254; }
        .chip.correct { border-color: var(--good); background: #12351f; }
        .chip.wrong { border-color: var(--bad); opacity: 0.55; animation: shake 0.35s; }
        .chip:disabled { cursor: default; }
        @keyframes shake { 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .continue-btn {
            margin-top: 0.65rem;
            background: linear-gradient(135deg, #6d5bd0, #4a3aa8);
            border: none;
            color: #fff;
            font-weight: 800;
            font-size: 0.95rem;
            border-radius: 12px;
            min-height: 48px;
            cursor: pointer;
            display: none;
        }
        .continue-btn.show { display: block; }
        .continue-btn:active { filter: brightness(1.15); }

        /* ---------- overlays ---------- */
        .overlay {
            position: fixed;
            inset: 0;
            background: #08071acc;
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 10;
        }
        .overlay.show { display: flex; }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.3rem 1.2rem;
            max-width: 420px;
            width: 100%;
            max-height: 86dvh;
            overflow-y: auto;
            text-align: center;
        }
        .panel h1 { font-size: 1.5rem; margin-bottom: 0.3rem; }
        .panel h1 span { color: var(--gold); }
        .panel p { font-size: 0.9rem; line-height: 1.55; color: var(--muted); margin: 0.55rem 0; }
        .panel p b { color: var(--text); }
        .panel .ver { font-size: 0.68rem; margin-top: 0.7rem; opacity: 0.6; }
        .big-btn {
            margin-top: 0.9rem;
            width: 100%;
            background: linear-gradient(135deg, #6d5bd0, #4a3aa8);
            border: none;
            color: #fff;
            font-weight: 800;
            font-size: 1.05rem;
            border-radius: 13px;
            min-height: 52px;
            cursor: pointer;
        }
        .big-btn.ghost { background: var(--surface2); border: 1px solid var(--border); }
        .big-btn.slim { min-height: 44px; font-size: 0.9rem; margin-top: 0.55rem; }
        .big-btn:active { filter: brightness(1.15); }

        .learn-table { width: 100%; border-collapse: collapse; margin: 0.6rem 0; font-size: 0.8rem; text-align: left; }
        .learn-table td { padding: 0.3rem 0.3rem; border-bottom: 1px solid #24204a; white-space: nowrap; }
        .learn-table .sym { font-size: 1rem; }
        .learn-table .dt { color: var(--muted); font-size: 0.74rem; }
        @media (max-width: 380px) {
            .learn-table { font-size: 0.72rem; }
            .learn-table .dt { font-size: 0.66rem; }
        }
        .rulebox { text-align: left; background: var(--surface2); border-radius: 10px; padding: 0.55rem 0.7rem; margin: 0.45rem 0; font-size: 0.82rem; line-height: 1.6; }
        .rulebox b { color: var(--gold); }
        .el-fire { color: var(--fire); font-weight: 700; }
        .el-earth { color: var(--earth); font-weight: 700; }
        .el-air { color: var(--air); font-weight: 700; }
        .el-water { color: var(--water); font-weight: 700; }

        .end-stars { font-size: 2.2rem; font-weight: 800; color: var(--gold); margin: 0.4rem 0 0.1rem; }
        .end-line { font-size: 0.95rem; color: var(--text); margin-top: 0.4rem; }
        .fortune { font-style: italic; }
    </style>
</head>

<body>
    <header>
        <div class="title" id="app-title">🔮 Astro <span>Salon</span></div>
        <div class="hud">
            <div class="streak" id="streak"></div>
            <div class="stars" id="stars">⭐ 0</div>
            <button class="icon-btn lang-btn" id="btn-lang" aria-label="Switch language">RU</button>
            <button class="icon-btn" id="btn-learn" aria-label="Learn the wheel">📖</button>
            <button class="icon-btn" id="btn-restart" aria-label="Restart">↻</button>
        </div>
    </header>

    <div class="wheel-wrap">
        <svg class="wheel" id="wheel" viewBox="0 0 400 400" aria-label="Zodiac wheel"></svg>
    </div>

    <div class="stage">
        <div class="card">
            <div class="client-row">
                <div class="client-emoji" id="c-emoji">🔮</div>
                <div>
                    <div class="client-name" id="c-name"></div>
                    <div class="client-sub" id="c-sub"></div>
                </div>
            </div>
            <div class="speech" id="speech"></div>
            <div class="bday" id="bday"></div>
            <div class="prompt" id="prompt"></div>
            <div class="feedback" id="feedback"></div>
            <div class="chips" id="chips"></div>
            <button class="continue-btn" id="btn-continue">Continue →</button>
        </div>
    </div>

    <div class="overlay show" id="ov-start">
        <div class="panel">
            <h1 id="start-title">🔮 Astro <span>Salon</span></h1>
            <p id="start-p1"></p>
            <p id="start-p2"></p>
            <p id="start-p3"></p>
            <button class="big-btn" id="btn-start"></button>
            <button class="big-btn ghost slim" id="btn-start-lang"></button>
            <p class="ver">Lab draft · v20</p>
        </div>
    </div>

    <div class="overlay" id="ov-learn">
        <div class="panel">
            <h1 id="learn-title">📖</h1>
            <div class="rulebox" id="rule-year"></div>
            <div class="rulebox" id="rule-elements"></div>
            <div class="rulebox" id="rule-mods"></div>
            <div class="rulebox" id="rule-opps"></div>
            <table class="learn-table" id="learn-table"></table>
            <button class="big-btn ghost" id="btn-learn-close"></button>
        </div>
    </div>

    <div class="overlay" id="ov-end">
        <div class="panel">
            <h1 id="end-title">🌙</h1>
            <div class="end-stars" id="end-stars"></div>
            <div class="client-sub" id="end-detail"></div>
            <div class="end-line" id="end-line"></div>
            <p class="fortune" id="end-fortune"></p>
            <button class="big-btn" id="btn-again"></button>
        </div>
    </div>

    <script>
        'use strict';

        /* ---------------- language ---------------- */

        let lang = localStorage.getItem('astroSalon_lang') === 'ru' ? 'ru' : 'en';

        /* ---------------- data ---------------- */

        const MONTHS_S = {

        const SIGNS = [

              name: { en: 'Leo', ru: 'Лев' }, epi: { en: 'the Lion', ru: '' },
              intro: { en: '“You may admire me. Most people do.”',

            { id: 5,  sym: '♍', emoji: '🌾', el: 'earth', mod: 'mutable',  planet: 'mercury', from: [8, 23],  to: [9, 22],
              name: { en: 'Virgo', ru: 'Дева' }, epi: { en: 'the Maiden', ru: '' },
              intro: { en: '“Your bookshelf was out of order. I fixed it. You’re welcome.”',

            { id: 6,  sym: '♎', emoji: '⚖️', el: 'air',   mod: 'cardinal', planet: 'venus',   from: [9, 23],  to: [10, 22],

                       ru: '«Никак не выберу, что надеть. Вот оба варианта — что скажете?»' } },
            { id: 7,  sym: '♏', emoji: '🦂', el: 'water', mod: 'fixed',    planet: 'pluto',   from: [10, 23], to: [11, 21],

        // corner season markers: [emoji, angle in degrees]
        const SEASONS = [

                ruleOpps: '<b>Противоположности</b> сидят прямо напротив друг друга — и, говорят, притягиваются: например, ♌ Лев ↔ ♒ Водолей.',

        };

        /* ---------------- helpers ---------------- */

        const $ = id => document.getElementById(id);
        const t = key => STR[lang][key];
        const rnd = n => Math.floor(Math.random() * n);
        const pick = arr => arr[rnd(arr.length)];
        function shuffle(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = rnd(i + 1);
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        const DAYS_IN_MONTH = [0, 31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

        // "Mar 21" / "21 мар"
        const fmtShort = (m, d) => lang === 'ru' ? `${d} ${MONTHS_S.ru[m - 1]}` : `${MONTHS_S.en[m - 1]} ${d}`;
        // "March 21" / "21 марта"
        const fmtFull = (m, d) => lang === 'ru' ? `${d} ${MONTHS_F.ru[m - 1]}` : `${MONTHS_F.en[m - 1]} ${d}`;
        const rangeShort = s => `${fmtShort(s.from[0], s.from[1])} – ${fmtShort(s.to[0], s.to[1])}`;

        const nameOf = s => s.name[lang];
        const elLabel = el => ELEMENTS[el].label[lang];
        const elSpan = el => `<span class="${ELEMENTS[el].cls}">${elLabel(el)}</span>`;

        // random birthday inside a sign's range, padded 1 day from each cusp
        function birthdayFor(sign) {
            const days = [];
            let [m, d] = sign.from;
            for (;;) {
                days.push([m, d]);
                if (m === sign.to[0] && d === sign.to[1]) break;
                d++;
                if (d > DAYS_IN_MONTH[m]) { d = 1; m = m === 12 ? 1 : m + 1; }
            }
            return pick(days.slice(1, -1));
        }

        function compatible(a, b) {
            return a.el === b.el || ELEMENTS[a.el].pair === b.el;
        }

        /* ---------------- wheel rendering ---------------- */

        const CX = 200, CY = 200, R0 = 88, R1 = 196;
        function polar(r, deg) {
            const rad = deg * Math.PI / 180;
            return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];
        }
        function wedgePath(a0, a1) {
            const [x0, y0] = polar(R0, a0), [x1, y1] = polar(R1, a0);
            const [x2, y2] = polar(R1, a1), [x3, y3] = polar(R0, a1);
            return `M ${x0} ${y0} L ${x1} ${y1} A ${R1} ${R1} 0 0 1 ${x2} ${y2} L ${x3} ${y3} A ${R0} ${R0} 0 0 0 ${x0} ${y0} Z`;
        }

        function svgText(NS, x, y, cls, content, fill) {
            const el = document.createElementNS(NS, 'text');
            el.setAttribute('x', x); el.setAttribute('y', y);
            el.setAttribute('text-anchor', 'middle');
            if (fill) el.setAttribute('fill', fill);
            el.classList.add(cls);
            el.textContent = content;
            return el;
        }

        function buildWheel() {
            const svg = $('wheel');
            const NS = 'http://www.w3.org/2000/svg';
            svg.innerHTML = '';
            SIGNS.forEach(sign => {
                // Aries centered at 12 o'clock (-90°), clockwise
                const mid = -90 + sign.id * 30;
                const path = document.createElementNS(NS, 'path');
                path.setAttribute('d', wedgePath(mid - 15, mid + 15));
                path.setAttribute('fill', ELEMENT_COLOR[sign.el]);
                path.setAttribute('fill-opacity', '0.22');
                path.setAttribute('stroke', '#0b0a1a');
                path.setAttribute('stroke-width', '2');
                path.classList.add('wedge');
                path.dataset.sign = sign.id;
                path.addEventListener('click', () => onWheelTap(sign));
                svg.appendChild(path);

                // one anchor per wedge, labels stacked vertically from it — radial
                // stacking overlaps on the 3/9-o'clock wedges and flips order in
                // the bottom hemisphere
                const [ax, ay] = polar(142, mid);
                svg.appendChild(svgText(NS, ax, ay - 17, 'wedge-sym', sign.sym, ELEMENT_COLOR[sign.el]));
                svg.appendChild(svgText(NS, ax, ay + 1, 'wedge-name', nameOf(sign)));
                svg.appendChild(svgText(NS, ax, ay + 14, 'wedge-date', fmtShort(sign.from[0], sign.from[1])));
                svg.appendChild(svgText(NS, ax, ay + 26, 'wedge-date', `– ${fmtShort(sign.to[0], sign.to[1])}`));
            });
            // season markers pinned to the corners, outside the rim
            SEASONS.forEach(se => {
                const right = se.deg === -45 || se.deg === 45;
                const y = (se.deg === -45 || se.deg === 225) ? 34 : 378;
                const label = svgText(NS, right ? 396 : 4, y, 'season-label', `${se.emoji} ${t('seasons')[se.key]}`);
                label.setAttribute('text-anchor', right ? 'end' : 'start');
                svg.appendChild(label);
            });
            const hubMain = svgText(NS, CX, CY + 2, 'hub-main', '');
            hubMain.id = 'hub-main';
            svg.appendChild(hubMain);
            const hubSub = svgText(NS, CX, CY + 24, 'hub-sub', '');
            hubSub.id = 'hub-sub';
            svg.appendChild(hubSub);
        }

        function setHub(main, sub) {
            $('hub-main').textContent = main;
            $('hub-sub').textContent = sub;
        }
        function wedgeEl(signId) {
            return document.querySelector(`.wedge[data-sign="${signId}"]`);
        }
        function clearWedgeMarks() {
            document.querySelectorAll('.wedge').forEach(w => w.classList.remove('correct', 'wrong'));
        }
        function setWheelActive(on) {
            $('wheel').classList.toggle('dimmed', !on);
        }

        /* ---------------- game state ---------------- */

        const TOTAL_GUESTS = 5;
        let G = null;

        function newSession() {
            G = {
                guests: shuffle(SIGNS).slice(0, TOTAL_GUESTS),
                qTypes: shuffle(['element', 'modality', 'planet', 'opposite', 'compat']),
                idx: -1,
                stars: 0, streak: 0, bestStreak: 0, firstTries: 0, questions: 0,
                phase: null, done: false,
            };
            updateHud();
            nextGuest();
        }

        function updateHud(popped) {
            const s = $('stars');
            s.textContent = `⭐ ${G ? G.stars : 0}`;
            if (popped) { s.classList.remove('pop'); void s.offsetWidth; s.classList.add('pop'); }
            const st = $('streak');
            st.textContent = G && G.streak >= 2 ? `🔥 ×${G.streak}` : '';
            st.classList.toggle('hot', G && G.streak >= 3);
        }

        /* ---------------- question flow ---------------- */

        function nextGuest() {
            G.idx++;
            if (G.idx >= TOTAL_GUESTS) return endSession();
            const sign = G.guests[G.idx];
            const [bm, bd] = birthdayFor(sign);
            G.client = { sign, bm, bd };
            G.revealed = false;
            startQuestion('sign');
        }

        // set up per-question state, then render
        function startQuestion(type) {
            const c = G.client;
            G.phase = type;
            G.tries = 0;
            G.answered = false;
            G.wrongKeys = [];
            G.chipHint = false;
            G.wheelHint = false;
            G.lastWrongWedge = null;
            G.chipKeys = null;
            G.happyIdx = rnd(HAPPY.en.length);

            if (type === 'sign') {
                G.answer = c.sign.id;
            } else if (type === 'element') {
                G.answer = c.sign.el;
                G.chipKeys = Object.keys(ELEMENTS);
            } else if (type === 'modality') {
                G.answer = c.sign.mod;
                G.chipKeys = Object.keys(MODS);
            } else if (type === 'planet') {
                G.answer = c.sign.planet;
                const others = shuffle(Object.keys(PLANETS).filter(p => p !== c.sign.planet)).slice(0, 3);
                G.chipKeys = shuffle([c.sign.planet, ...others]);
            } else if (type === 'opposite') {
                G.answer = oppOf(c.sign).id;
            } else if (type === 'compat') {
                G.partner = pick(SIGNS.filter(s => s.id !== c.sign.id));
                G.answer = compatible(c.sign, G.partner) ? 'yes' : 'no';
                G.chipKeys = ['yes', 'no'];
            }
            renderCard();
        }

        function chipLabel(key) {
            switch (G.phase) {
                case 'element':
                    return `${elLabel(key)}<small>${ELEMENTS[key].signs}</small>`;
                case 'modality':
                    return `${MODS[key].label[lang]}<small>${MODS[key].hint[lang]} — ${MODS[key].desc[lang]}</small>`;
                case 'planet':
                    return PLANETS[key][lang];
                case 'compat':
                    return key === 'yes'
                        ? `${t('compatYes')}<small>${t('compatYesSub')}</small>`
                        : `${t('compatNo')}<small>${t('compatNoSub')}</small>`;
            }
        }

        // full re-render of the current question from state (also used on language switch)
        function renderCard() {
            const c = G.client;

            $('c-emoji').textContent = c.sign.emoji;
            $('c-name').textContent = G.revealed ? `${nameOf(c.sign)} ${c.sign.sym}` : t('unknown');
            $('c-sub').textContent = t('guestN')(G.idx + 1, TOTAL_GUESTS);

            const bday = $('bday');
            if (G.phase === 'sign') {
                $('speech').innerHTML = c.sign.intro[lang];
                bday.innerHTML = t('born')(fmtFull(c.bm, c.bd));
                bday.classList.add('show');
                $('prompt').textContent = t('promptSign');
                setHub(fmtShort(c.bm, c.bd), t('hubFind'));
            } else {
                bday.classList.remove('show');
                setHub(c.sign.sym, nameOf(c.sign));
                if (G.phase === 'element') {
                    $('speech').innerHTML = t('qElement');
                    $('prompt').textContent = t('promptElement');
                } else if (G.phase === 'modality') {
                    $('speech').innerHTML = t('qModality');
                    $('prompt').textContent = t('promptModality');
                } else if (G.phase === 'planet') {
                    $('speech').innerHTML = t('qPlanet');
                    $('prompt').textContent = t('promptPlanet');
                } else if (G.phase === 'opposite') {
                    $('speech').innerHTML = t('qOpposite');
                    $('prompt').textContent = t('promptOpposite');
                } else if (G.phase === 'compat') {
                    $('speech').innerHTML = t('qCompat')(nameOf(G.partner), G.partner.sym);
                    $('prompt').textContent = t('promptCompat');
                }
            }

            // chips
            const box = $('chips');
            box.innerHTML = '';
            box.className = 'chips' + (G.phase === 'modality' ? ' single' : '');
            if (G.chipKeys) {
                G.chipKeys.forEach(key => {
                    const b = document.createElement('button');
                    b.className = 'chip';
                    b.innerHTML = chipLabel(key);
                    b.dataset.key = key;
                    if (G.wrongKeys.includes(key)) { b.classList.add('wrong'); b.disabled = true; }
                    if (G.answered) {
                        b.disabled = true;
                        if (key === G.answer) b.classList.add('correct');
                    }
                    b.addEventListener('click', () => onChipTap(b, key));
                    box.appendChild(b);
                });
            }

            // wheel activity + marks
            if (G.phase === 'sign' || G.phase === 'opposite') {
                setWheelActive(!G.answered);
                clearWedgeMarks();
                if (G.answered) {
                    wedgeEl(G.answer).classList.add('correct');
                    if (G.lastWrongWedge !== null) wedgeEl(G.lastWrongWedge).classList.add('wrong');
                }
            } else {
                setWheelActive(false);
                clearWedgeMarks();
            }

            // feedback
            const f = $('feedback');
            if (G.answered) {
                const rule = ruleText();
                if (G.lastCorrect) {
                    const quip = G.phase === 'sign' ? t('revealYes')(c.sign) : HAPPY[lang][G.happyIdx];
                    const bonus = G.lastBonus ? ` · 🔥 +${G.lastBonus}⭐ ${t('streakBonus')}` : '';
                    f.className = 'feedback good';
                    f.innerHTML = `✓ ${quip} &nbsp;+${G.lastEarned}⭐${bonus}<br>${rule}`;
                } else {
                    const head = G.phase === 'sign' ? t('revealNo')(c.sign) : t('wrongHead');
                    f.className = 'feedback bad';
                    f.innerHTML = `✗ ${head}<br>${rule}`;
                }
            } else if (G.chipHint) {
                f.className = 'feedback hint';
                f.innerHTML = t('chipHint');
            } else if (G.wheelHint) {
                f.className = 'feedback hint';
                f.innerHTML = hintText();
            } else {
                f.className = 'feedback';
                f.innerHTML = '';
            }

            $('btn-continue').textContent = t('continueBtn');
            $('btn-continue').classList.toggle('show', !!G.answered);
        }

        /* ---------------- answering ---------------- */

        function ruleText() {
            const c = G.client, s = c.sign;
            const en = lang === 'en';
            switch (G.phase) {
                case 'sign':
                    return en
                        ? `${fmtFull(c.bm, c.bd)} falls in <b>${s.name.en} ${s.sym}</b> (${rangeShort(s)}).`
                        : `${fmtFull(c.bm, c.bd)} — это <b>${s.name.ru} ${s.sym}</b> (${rangeShort(s)}).`;
                case 'element':
                    return en
                        ? `${s.name.en} is ${elSpan(s.el)} — ${elLabel(s.el)} signs are ${ELEMENTS[s.el].signs}.`
                        : `${s.name.ru} — знак ${ELEMENTS[s.el].gen}. Знаки ${ELEMENTS[s.el].gen}: ${ELEMENTS[s.el].signs}.`;
                case 'modality': {
                    const m = MODS[s.mod];
                    return en
                        ? `${s.name.en} is <b>${m.label.en}</b> (${m.hint.en}): it ${m.desc.en}. ${m.pl.en} signs are ${m.signs}.`
                        : `${s.name.ru} — <b>${m.label.ru.toLowerCase()}</b> знак: он ${m.desc.ru}. ${m.pl.ru}: ${m.signs}.`;
                }
                case 'planet':
                    return en
                        ? `${s.name.en} ${s.sym} is ruled by <b>${PLANETS[s.planet].en}</b>.`
                        : `Управитель знака ${s.name.ru} ${s.sym} — <b>${PLANETS[s.planet].ru}</b>.`;
                case 'opposite': {
                    const o = oppOf(s);
                    return en
                        ? `Opposites sit 6 signs apart: <b>${s.name.en} ${s.sym} ↔ ${o.name.en} ${o.sym}</b>.`
                        : `Противоположности — через 6 знаков: <b>${s.name.ru} ${s.sym} ↔ ${o.name.ru} ${o.sym}</b>.`;
                }
                case 'compat': {
                    const p = G.partner;
                    const ok = G.answer === 'yes';
                    const A = elSpan(s.el), B = elSpan(p.el);
                    if (en) {
                        const rel = s.el === p.el ? 'share the same element' :
                            (ok ? `are a classic pair (${elLabel(s.el)} ↔ ${elLabel(p.el)})` :
                                `don't naturally pair (${elLabel(s.el)} + ${elLabel(p.el)})`);
                        return `${A} and ${B} ${rel}. Rule: Fire ↔ Air, Earth ↔ Water.`;
                    }
                    const rel = s.el === p.el ? 'одна стихия — лёгкая пара' :
                        (ok ? `классическая пара (${elLabel(s.el)} ↔ ${elLabel(p.el)})` :
                            `сами собой не складываются (${elLabel(s.el)} + ${elLabel(p.el)})`);
                    return `${A} и ${B} — ${rel}. Правило: Огонь ↔ Воздух, Земля ↔ Вода.`;
                }
            }
        }

        function hintText() {
            const c = G.client;
            if (G.phase === 'sign') {
                return t('hintSign')(fmtFull(c.bm, c.bd), SEASON_HINTS[lang][c.sign.id]);
            }
            if (G.phase === 'opposite') {
                return t('hintOpp')(c.sign.sym);
            }
            return '';
        }

        function feedback(kind, html) {
            const f = $('feedback');
            f.className = 'feedback ' + kind;
            f.innerHTML = html;
        }

        function resolve(correct) {
            G.questions++;
            const earned = correct ? (G.tries === 1 ? 2 : 1) : 0;
            if (correct) {
                if (G.tries === 1) {
                    G.firstTries++;
                    G.streak++;
                    G.bestStreak = Math.max(G.bestStreak, G.streak);
                } else {
                    G.streak = 0;
                }
                let bonus = 0;
                if (G.streak > 0 && G.streak % 3 === 0) bonus = 1;
                G.stars += earned + bonus;
                G.lastBonus = bonus;
            } else {
                G.streak = 0;
                G.lastBonus = 0;
            }
            G.answered = true;
            G.lastCorrect = correct;
            G.lastEarned = earned;
            if (G.phase === 'sign') G.revealed = true;
            updateHud(correct && earned > 0);
            renderCard();
        }

        function onWheelTap(sign) {
            if (!G || G.done || G.answered) return;
            if (G.phase !== 'sign' && G.phase !== 'opposite') return;
            G.tries++;
            if (sign.id === G.answer) {
                resolve(true);
            } else if (G.tries >= 2) {
                G.lastWrongWedge = sign.id;
                resolve(false);
            } else {
                wedgeEl(sign.id).classList.add('wrong');
                setTimeout(() => wedgeEl(sign.id).classList.remove('wrong'), 500);
                G.wheelHint = true;
                feedback('hint', hintText());
            }
        }

        function onChipTap(btn, key) {
            if (!G || G.done || G.answered || btn.disabled) return;
            G.tries++;
            if (key === G.answer) {
                resolve(true);
            } else if (G.tries >= 2) {
                G.wrongKeys.push(key);
                resolve(false);
            } else {
                G.wrongKeys.push(key);
                btn.classList.add('wrong');
                btn.disabled = true;
                G.chipHint = true;
                feedback('hint', t('chipHint'));
            }
        }

        function onContinue() {
            if (G.phase === 'sign') startQuestion(G.qTypes[G.idx]);
            else nextGuest();
        }

        /* ---------------- session end ---------------- */

        function endSession() {
            G.done = true;
            G.fortuneIdx = rnd(FORTUNES.en.length);
            renderEnd();
            $('ov-end').classList.add('show');
        }

        function renderEnd() {
            if (!G || !G.done) return;
            const max = TOTAL_GUESTS * 2 * 2;
            const pct = G.stars / max;
            $('end-title').textContent = t('endTitle');
            $('end-stars').textContent = `⭐ ${G.stars}`;
            $('end-detail').textContent = t('endDetail')(G.firstTries, G.questions, G.bestStreak);
            $('end-line').textContent =
                t('endLines')[pct >= 0.9 ? 0 : pct >= 0.7 ? 1 : pct >= 0.4 ? 2 : 3];
            $('end-fortune').textContent = `${t('fortunePrefix')} “${FORTUNES[lang][G.fortuneIdx]}”`;
            $('btn-again').textContent = t('againBtn');
        }

        /* ---------------- static UI + learn overlay ---------------- */

        function buildLearnTable() {
            $('learn-table').innerHTML = SIGNS.map(s => `
                <tr>
                    <td class="sym" style="color:${ELEMENT_COLOR[s.el]}">${s.sym}</td>
                    <td><b>${nameOf(s)}</b></td>
                    <td class="dt">${rangeShort(s)}</td>
                    <td class="${ELEMENTS[s.el].cls}">${elLabel(s.el)}</td>
                    <td class="dt">${PLANETS[s.planet][lang]}</td>
                </tr>`).join('');
        }

        function renderStatic() {
            $('app-title').innerHTML = t('title');
            $('start-title').innerHTML = t('title');
            $('start-p1').innerHTML = t('startP1');
            $('start-p2').innerHTML = t('startP2');
            $('start-p3').innerHTML = t('startP3');
            $('btn-start').textContent = t('startBtn');
            $('btn-start-lang').textContent = t('langOther');
            $('btn-lang').textContent = lang === 'en' ? 'RU' : 'EN';
            $('learn-title').textContent = t('learnTitle');
            $('rule-year').innerHTML = t('ruleYear');
            $('rule-elements').innerHTML = t('ruleElements');
            $('rule-mods').innerHTML = t('ruleMods');
            $('rule-opps').innerHTML = t('ruleOpps');
            $('btn-learn-close').textContent = t('learnClose');
            $('btn-continue').textContent = t('continueBtn');
        }

        function setLang(l) {
            lang = l;
            localStorage.setItem('astroSalon_lang', l);
            document.documentElement.lang = l;
            renderStatic();
            buildWheel();
            buildLearnTable();
            if (G && G.done) renderEnd();
            else if (G) renderCard();
            else setHub('🔮', '');
        }

        /* ---------------- wiring ---------------- */

        renderStatic();
        buildWheel();
        buildLearnTable();
        setHub('🔮', '');
        document.documentElement.lang = lang;

        $('btn-start').addEventListener('click', () => {
            $('ov-start').classList.remove('show');
            newSession();
        });
        $('btn-again').addEventListener('click', () => {
            $('ov-end').classList.remove('show');
            newSession();
        });
        $('btn-restart').addEventListener('click', () => {
            $('ov-end').classList.remove('show');
            newSession();
        });
        $('btn-learn').addEventListener('click', () => $('ov-learn').classList.add('show'));
        $('btn-learn-close').addEventListener('click', () => $('ov-learn').classList.remove('show'));
        $('btn-continue').addEventListener('click', onContinue);
        $('btn-lang').addEventListener('click', () => setLang(lang === 'en' ? 'ru' : 'en'));
        $('btn-start-lang').addEventListener('click', () => setLang(lang === 'en' ? 'ru' : 'en'));
    </script>
</body>

</html>
