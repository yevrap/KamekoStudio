<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skazka Trail</title>
<style>
  * { box-sizing: border-box; }

  :root {
    --bg: #fbfaf7;
    --text: #1c1a17;
    --text-muted: #6b665e;
    --border: #d8d3c8;
    --surface: #ffffff;
    --accent: #3a3530;
    --tale-accent: var(--accent);
    --tale-wash: transparent;
    --display-font: 'Iowan Old Style', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16140f;
      --text: #eae6dd;
      --text-muted: #9b9488;
      --border: #3a352c;
      --surface: #1f1c16;
      --accent: #eae6dd;
    }
  }

  /* Per-tale accent (Q1=C / Q6=B): one consistent frame + type, accent color
     shifts per tale. Scoped via the data-tale attribute the bootstrap script
     sets on #app and on each tale-select card — no engine.js or content-pack
     changes. --tale-wash is a low-alpha rgba used only for the background
     treatment (Q2), never for text/borders. */
  [data-tale="morozko"]     { --tale-accent: #2f5f8a; --tale-wash: rgba(47, 95, 138, 0.08); }
  [data-tale="vasilisa"]    { --tale-accent: #9a5b1f; --tale-wash: rgba(154, 91, 31, 0.09); }
  [data-tale="geese-swans"] { --tale-accent: #3c7a5c; --tale-wash: rgba(60, 122, 92, 0.09); }

  @media (prefers-color-scheme: dark) {
    [data-tale="morozko"]     { --tale-accent: #8ec4ea; --tale-wash: rgba(142, 196, 234, 0.14); }
    [data-tale="vasilisa"]    { --tale-accent: #e0a458; --tale-wash: rgba(224, 164, 88, 0.16); }
    [data-tale="geese-swans"] { --tale-accent: #7fd0ab; --tale-wash: rgba(127, 208, 171, 0.15); }
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
  }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.6;
    min-height: 100vh;
    min-height: 100dvh;
    /* Q2=D: deliberate background treatment instead of blank void — a soft
       per-tale wash (transparent when no tale is active) over the base bg. */
    background-image: radial-gradient(ellipse 1100px 700px at 50% -8%, var(--tale-wash), transparent 70%);
    background-color: var(--bg);
    background-attachment: fixed;
  }

  #app {
    max-width: 620px;
    margin: 0 auto;
    padding: 1rem 1.1rem 3rem;
  }

  @media (min-width: 900px) {
    /* Q2=D: widen the reading column and bump type slightly instead of
       centering the same narrow mobile column in empty space. */
    #app, .st-panel-inner {
      max-width: 780px;
    }
    .st-scene p {
      font-size: 1.12rem;
      line-height: 1.7;
    }
  }

  .st-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    flex-wrap: wrap;
    padding-bottom: 0.85rem;
    margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    padding-top: 0.85rem;
  }

  .st-tale-title {
    font-weight: bold;
    font-size: 1rem;
    letter-spacing: 0.02em;
  }

  /* Q5=B: display face for the tale title + ending titles only, body stays
     Georgia. Q7=B: excluded from the debug view via data-debug on #app. */
  #app:not([data-debug]) .st-tale-title,
  #app:not([data-debug]) .st-ending-title {
    font-family: var(--display-font);
  }

  .st-toolbar-actions {
    display: flex;
    gap: 0.5rem;
  }

  .st-btn {
    font-family: inherit;
    font-size: 0.78rem;
    padding: 0.5rem 0.7rem;
    min-height: 40px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }

  .st-btn-ghost { background: transparent; }
  .st-btn-ghost:active { background: var(--surface); }

  .st-scene p {
    margin: 0 0 1.1em;
    font-size: 1.05rem;
  }

  /* Q4=C: a short fade/rise on every scene render — engine.js fully replaces
     #app's innerHTML per render(), so a fresh .st-scene element is created
     each time and the animation replays automatically with no engine hook. */
  .st-scene { animation: st-scene-in 220ms ease-out; }
  @keyframes st-scene-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .st-scene { animation: none; }
  }

  .st-ending-eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin: 0 0 0.3em;
  }

  .st-ending-title {
    font-size: 1.5rem;
    margin: 0 0 0.6em;
    color: var(--tale-accent, var(--text));
  }

  .st-moral {
    font-style: italic;
    color: var(--text-muted);
    border-left: 2px solid var(--tale-accent, var(--border));
    padding-left: 0.9em;
  }

  .st-choices {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-top: 1.4rem;
  }

  .st-choice {
    width: 100%;
    text-align: left;
    padding: 0.85rem 1rem;
    min-height: 44px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 0.98rem;
    cursor: pointer;
    transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease, background-color 120ms ease;
  }
  .st-choice:hover { border-color: var(--tale-accent, var(--accent)); box-shadow: 0 0 0 1px var(--tale-accent, var(--accent)) inset; }
  .st-choice:active { background: var(--border); transform: scale(0.98); }

  .st-btn-primary {
    width: 100%;
    justify-content: center;
    padding: 0.9rem 1rem;
    min-height: 44px;
    font-size: 1rem;
    font-weight: bold;
    background: var(--tale-accent, var(--accent));
    color: var(--bg);
    border-color: var(--tale-accent, var(--accent));
    transition: transform 120ms ease, box-shadow 120ms ease;
  }
  .st-btn-primary:hover { box-shadow: 0 0 0 3px var(--tale-wash); }
  .st-btn-primary:active { transform: scale(0.98); }

  @media (prefers-reduced-motion: reduce) {
    .st-choice, .st-btn-primary { transition: none; }
    .st-choice:active, .st-btn-primary:active { transform: none; }
  }

  .st-recap-block {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .st-recap-block h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin: 0 0 0.6em;
  }

  .st-recap-list, .st-debug-choices {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .st-recap-list li {
    font-size: 0.85rem;
    padding: 0.4em 0;
    border-bottom: 1px dashed var(--border);
  }
  .st-recap-scene { display: block; color: var(--text-muted); }
  .st-recap-choice { display: block; }
  .st-recap-empty { color: var(--text-muted); font-size: 0.85rem; }

  .st-panel {
    position: fixed;
    inset: 0;
    background: var(--bg);
    overflow-y: auto;
    z-index: 10;
  }
  .st-panel-inner {
    max-width: 620px;
    margin: 0 auto;
    padding: 1rem 1.1rem 3rem;
  }
  .st-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.85rem;
    margin-bottom: 1rem;
  }
  .st-panel-header h2 { font-size: 1.1rem; margin: 0; }

  /* Tale-select screen — Q3=B: card grid, one column on mobile, each card
     carries its own data-tale so the swatch/border pick up that tale's
     --tale-accent the same way the play screen does. */
  .st-select-intro { color: var(--text-muted); font-size: 0.95rem; margin: 0 0 0.4rem 0; padding-bottom: 0.4rem; }
  .st-tale-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  @media (min-width: 640px) {
    .st-tale-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  }
  .st-tale-card {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    overflow: hidden;
  }
  .st-tale-swatch { height: 6px; background: var(--tale-accent, var(--accent)); }
  .st-tale-card-body { display: flex; flex-direction: column; gap: 0.2rem; padding: 1rem 1.1rem 0.5rem; flex: 1; }
  .st-select-title { font-weight: bold; font-size: 1.05rem; }
  .st-select-subtitle { color: var(--text-muted); font-size: 0.85rem; }
  .st-tale-card .st-select-actions { display: flex; gap: 0.5rem; padding: 0.9rem 1.1rem 1.1rem; }

  /* Debug view — plain, dense, functional; not part of the play experience */
  .st-debug { font-family: ui-monospace, 'SFMono-Regular', Consolas, monospace; font-size: 0.8rem; }
  .st-debug-issues { color: #b3261e; border: 1px solid #b3261e; padding: 0.6em 0.8em; border-radius: 6px; margin: 0.8em 0; }
  .st-debug-ok { color: #2e7d32; }
  .st-debug-node { border: 1px solid var(--border); border-radius: 6px; padding: 0.7em 0.9em; margin-bottom: 0.7em; }
  .st-debug-ending { border-color: var(--tale-accent, var(--accent)); }
  .st-debug-tag { font-size: 0.65rem; background: var(--tale-accent, var(--accent)); color: var(--bg); padding: 0.1em 0.4em; border-radius: 4px; }
  .st-debug-text { color: var(--text-muted); }
  .st-debug-choices li { padding: 0.15em 0; }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="engine.js"></script>
  <script src="tales/vasilisa.js"></script>
  <script src="tales/morozko.js"></script>
  <script src="tales/geese-swans.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var root = document.getElementById('app');

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      // Tale-select screen — bare text, same bar as the story screens.
      // Selecting a tale is a real link to ?tale=<id>, so ?tale=<id>&debug=1
      // reaches the debug view per tale (see engine.js's own debug=1 check)
      // and the browser Back button returns here, with no engine changes.
      function renderSelect() {
        var ids = Object.keys(window.SKAZKA_TALES || {});
        var html = '';
        html += '<div class="st-toolbar"><span class="st-tale-title">Skazka Trail</span></div>';
        html += '<p class="st-select-intro">Choose a tale.</p>';
        html += '<div class="st-tale-grid">';
        ids.forEach(function (id) {
          var tale = window.SKAZKA_TALES[id];
          html += '<div class="st-tale-card" data-tale="' + esc(id) + '">';
          html += '<div class="st-tale-swatch"></div>';
          html += '<div class="st-tale-card-body">';
          html += '<span class="st-select-title">' + esc(tale.title) + '</span>';
          if (tale.subtitle) html += '<span class="st-select-subtitle">' + esc(tale.subtitle) + '</span>';
          html += '</div>';
          html += '<div class="st-select-actions">';
          html += '<a class="st-btn" href="?tale=' + encodeURIComponent(id) + '">Play</a>';
          html += '<a class="st-btn st-btn-ghost" href="?tale=' + encodeURIComponent(id) + '&debug=1">Debug</a>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
        root.innerHTML = html;
      }

      // Q1/Q5/Q7 CSS hooks — read-only, presentation-only reads of the URL
      // (data-tale mirrors the tale id already read below; data-debug mirrors
      // engine.js's own debug=1 check) so engine.js and the content packs
      // never need to know about either attribute.
      var taleId = new URLSearchParams(location.search).get('tale');
      var isDebug = /(?:^|[?&])debug=1(?:&|$)/.test(location.search);
      if (isDebug) root.setAttribute('data-debug', '1'); else root.removeAttribute('data-debug');

      if (taleId && window.SKAZKA_TALES && window.SKAZKA_TALES[taleId]) {
        root.setAttribute('data-tale', taleId);
        SkazkaEngine.mount(root, window.SKAZKA_TALES[taleId]);
      } else {
        root.removeAttribute('data-tale');
        renderSelect();
      }
    });
  </script>
</body>
</html>
